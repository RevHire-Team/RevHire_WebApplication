<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reset Password | RevHire</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>

        :root{
        --primary:#2563eb;
        --primary-dark:#1d4ed8;
        --bg:#f8fafc;
        --border:#e2e8f0;
        --text:#0f172a;
        --muted:#64748b;
        }

        *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Plus Jakarta Sans',sans-serif;
        }

        body{
        background:var(--bg);
        height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        }

        /* CARD */

        .card{
        background:white;
        width:420px;
        padding:35px;
        border-radius:12px;
        box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        .title{
        font-size:26px;
        font-weight:700;
        margin-bottom:4px;
        }

        .subtitle{
        font-size:14px;
        color:var(--muted);
        margin-bottom:25px;
        }

        /* FORM */

        .form-group{
        margin-bottom:16px;
        }

        label{
        font-size:14px;
        font-weight:600;
        display:block;
        margin-bottom:6px;
        }

        input,select{
        width:100%;
        padding:12px;
        border:1px solid var(--border);
        border-radius:8px;
        font-size:14px;
        outline:none;
        }

        input:focus,select:focus{
        border-color:var(--primary);
        box-shadow:0 0 0 2px rgba(37,99,235,0.15);
        }

        /* PASSWORD */

        .password-wrapper{
        position:relative;
        }

        .password-wrapper i{
        position:absolute;
        right:12px;
        top:50%;
        transform:translateY(-50%);
        cursor:pointer;
        color:var(--muted);
        }

        /* PROGRESS BAR */

        .progress{
        height:6px;
        background:#e2e8f0;
        border-radius:6px;
        margin-top:8px;
        overflow:hidden;
        }

        .progress-bar{
        height:100%;
        width:0%;
        background:red;
        transition:0.3s;
        }

        /* RULES */

        .rules{
        font-size:12px;
        margin-top:6px;
        }

        .rules p{
        margin:2px 0;
        }

        .valid{color:green;}
        .invalid{color:#dc2626;}

        /* BUTTON */

        button{
        width:100%;
        padding:12px;
        border:none;
        border-radius:8px;
        background:var(--primary);
        color:white;
        font-weight:600;
        cursor:pointer;
        margin-top:12px;
        }

        button:hover{
        background:var(--primary-dark);
        }

        .back{
        text-align:center;
        margin-top:16px;
        }

        .back a{
        color:var(--muted);
        font-size:14px;
        text-decoration:none;
        }

        .alert{
        padding:10px;
        border-radius:6px;
        margin-bottom:15px;
        font-size:13px;
        }

        .error{
        background:#fee2e2;
        color:#991b1b;
        }

        .success{
        background:#dcfce7;
        color:#166534;
        }

    </style>

</head>

<body>

<div class="card">

    <div class="title">Reset Password</div>
    <div class="subtitle">Verify your identity and update password</div>

    <div th:if="${error}" class="alert error" th:text="${error}"></div>
    <div th:if="${success}" class="alert success" th:text="${success}"></div>

    <form th:action="@{/auth/forgot-password}" method="post">

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="Enter registered email" required>
        </div>

        <div class="form-group">
            <label>Security Question</label>
            <select name="securityQuestion" required>
                <option value="">Select a question</option>
                <option value="color">What is your favourite color?</option>
                <option value="city">What is your birth city?</option>
                <option value="mother">What is your mother's name?</option>
                <option value="pet">What is your first pet name?</option>
            </select>
        </div>

        <div class="form-group">
            <label>Security Answer</label>
            <input type="text" name="answer" placeholder="Enter your answer" required>
        </div>

        <div class="form-group">

            <label>New Password</label>

            <div class="password-wrapper">
                <input type="password" id="password" name="newPassword" required>
                <i class="fa fa-eye" id="togglePassword"></i>
            </div>

            <div class="progress">
                <div class="progress-bar" id="strengthBar"></div>
            </div>

            <div class="rules">
                <p id="length" class="invalid">• Minimum 8 characters</p>
                <p id="upper" class="invalid">• 1 uppercase letter</p>
                <p id="number" class="invalid">• 1 number</p>
                <p id="special" class="invalid">• 1 special character</p>
            </div>

        </div>

        <button type="submit">Update Password</button>

    </form>

    <div class="back">
        <a th:href="@{/auth/login}">
            <i class="fa fa-arrow-left"></i> Back to Login
        </a>
    </div>

</div>

<script>

    const password=document.getElementById("password");
    const bar=document.getElementById("strengthBar");

    const length=document.getElementById("length");
    const upper=document.getElementById("upper");
    const number=document.getElementById("number");
    const special=document.getElementById("special");

    document.getElementById("togglePassword").onclick=function(){

    const type=password.type==="password"?"text":"password";
    password.type=type;

    this.classList.toggle("fa-eye-slash");

    };

    password.addEventListener("keyup",function(){

    let val=password.value;
    let strength=0;

    if(val.length>=8){length.classList.replace("invalid","valid");strength+=25;}
    else{length.classList.replace("valid","invalid");}

    if(/[A-Z]/.test(val)){upper.classList.replace("invalid","valid");strength+=25;}
    else{upper.classList.replace("valid","invalid");}

    if(/[0-9]/.test(val)){number.classList.replace("invalid","valid");strength+=25;}
    else{number.classList.replace("valid","invalid");}

    if(/[!@#$%^&*]/.test(val)){special.classList.replace("invalid","valid");strength+=25;}
    else{special.classList.replace("valid","invalid");}

    bar.style.width=strength+"%";

    if(strength<=25)bar.style.background="red";
    else if(strength<=50)bar.style.background="orange";
    else if(strength<=75)bar.style.background="gold";
    else bar.style.background="green";

    });

</script>

</body>
</html>
