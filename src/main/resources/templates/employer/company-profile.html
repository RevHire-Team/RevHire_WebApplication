<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Company Profile | RevHire</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root { --primary: #2563eb; --sidebar-bg: #0f172a; --bg-subtle: #f8fafc; --text-main: #0f172a; --border: #e2e8f0; }
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-subtle); color: var(--text-main); display: flex; min-height: 100vh; }

        /* Sidebar */
.logo {
    font-size: 1.5rem;
    font-weight: 800;
    padding: 0 1rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 10px;
    color: white;
    text-decoration: none;
}

.sidebar {
    width: 250px;
    height: 100vh;
    background: var(--sidebar-bg);
    color: white;
    position: fixed;
    padding: 1.5rem 1rem;
    display: flex;
    flex-direction: column; /* This keeps the logout button at the bottom */
}

.nav-menu {
    flex-grow: 1; /* Pushes the logout button to the bottom */
}        .nav-link { color: #94a3b8; padding: 0.8rem 1rem; border-radius: 12px; display: flex; align-items: center; gap: 12px; text-decoration: none; margin-bottom: 5px; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: var(--primary); color: white; }

        /* Main */
        .main-content { margin-left: 250px; flex: 1; padding: 3rem; }
        .profile-card { background: white; border-radius: 20px; padding: 3rem; max-width: 650px; margin: 0 auto; border: 1px solid var(--border); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .company-icon { width: 100px; height: 100px; border-radius: 50%; background: #eff6ff; color: var(--primary); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; font-size: 2.5rem; }
        .detail-row { display: flex; padding: 1rem 0; border-bottom: 1px solid #f1f5f9; }
        .label { width: 150px; font-weight: 700; color: #64748b; }
    </style>
</head>
<body>

<nav class="sidebar">
    <!-- Logo -->
    <a th:href="@{/employer/dashboard/{id}(id=${session.loggedInUser.userId})}" class="logo">
        <i class="bi bi-rocket-takeoff-fill text-primary"></i>
        <span>RevHire</span>
    </a>

    <!-- Navigation Menu -->
    <div class="nav-menu">
        <a th:href="@{/employer/dashboard/{id}(id=${session.loggedInUser.userId})}" class="nav-link active">
            <i class="bi bi-speedometer2"></i> <span>Dashboard</span>
        </a>
        <a th:href="@{/jobs/create}" class="nav-link">
            <i class="bi bi-plus-lg"></i> <span>Post New Job</span>
        </a>
        <a th:href="@{/jobs/manage}" class="nav-link">
            <i class="bi bi-building"></i> <span>Manage Jobs</span>
        </a>
        <a th:href="@{/applications/manage}" class="nav-link">
            <i class="bi bi-file-earmark-person"></i> <span>Manage Applications</span>
        </a>
        <a th:href="@{/employer/profile}" class="nav-link">
            <i class="bi bi-building"></i> <span>Company Profile</span>
        </a>
        <a th:href="@{/notifications/notification}" class="nav-link">
            <i class="bi bi-bell"></i> <span>Notifications</span>
        </a>
        <a th:href="@{/auth/reset-password}" class="nav-link">
            <i class="bi bi-key"></i> <span>Reset Password</span>
        </a>
    </div>

    <!-- Logout -->
    <div class="mt-auto">
        <a th:href="@{/auth/logout}" class="nav-link text-danger">
            <i class="bi bi-box-arrow-left"></i> <span>Logout</span>
        </a>
    </div>
</nav>

<main class="main-content">
    <header class="d-flex justify-content-between align-items-center mb-5">
        <div>
            <h2 class="fw-800">Company Profile</h2>
            <p class="text-muted">Manage your public-facing company information.</p>
        </div>
        <a th:href="@{/employer/profile/edit}" class="btn btn-outline-primary px-4 rounded-pill">
            <i class="bi bi-pencil-square me-2"></i>Edit Profile
        </a>
    </header>

    <div class="profile-card">
        <div class="text-center mb-5">
            <div class="company-icon"><i class="bi bi-building"></i></div>
            <h3 class="fw-800" th:text="${profile.companyName}">Company Name</h3>
            <span class="badge bg-primary bg-opacity-10 text-primary px-3 py-2 rounded-pill mt-2"
                  th:text="${profile.industry}">Industry</span>
        </div>

        <div class="row g-4">
            <div class="col-sm-6">
                <label class="text-muted small fw-bold text-uppercase">Company Size</label>
                <div class="fw-600 fs-6" th:text="${profile.companySize}">-</div>
            </div>
            <div class="col-sm-6">
                <label class="text-muted small fw-bold text-uppercase">Location</label>
                <div class="fw-600 fs-6" th:text="${profile.location}">-</div>
            </div>
            <div class="col-12">
                <label class="text-muted small fw-bold text-uppercase">Website</label>
                <div class="text-primary fw-600" th:text="${profile.website}">-</div>
            </div>
            <div class="col-12">
                <label class="text-muted small fw-bold text-uppercase">About Us</label>
                <p class="mt-2 text-secondary lh-lg" th:text="${profile.description}">-</p>
            </div>
        </div>
    </div>
</main>

</body>
</html>
