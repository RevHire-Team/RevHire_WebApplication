<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Company Profile | RevHire</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root { --primary: #2563eb; --sidebar-bg: #0f172a; --bg-subtle: #f8fafc; --text-main: #0f172a; --border: #e2e8f0; }
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-subtle); color: var(--text-main); display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar { width: 250px; background: var(--sidebar-bg); color: white; position: fixed; height: 100vh; padding: 1.5rem 1rem; }
        .nav-link { color: #94a3b8; padding: 0.8rem 1rem; border-radius: 12px; display: flex; align-items: center; gap: 12px; text-decoration: none; margin-bottom: 5px; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: var(--primary); color: white; }

        /* Main */
        .main-content { margin-left: 250px; flex: 1; padding: 3rem; }
        .profile-card { background: white; border-radius: 20px; padding: 3rem; max-width: 650px; margin: 0 auto; border: 1px solid var(--border); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .company-icon { width: 100px; height: 100px; border-radius: 50%; background: #eff6ff; color: var(--primary); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; font-size: 2.5rem; }
        .detail-row { display: flex; padding: 1rem 0; border-bottom: 1px solid #f1f5f9; }
        .label { width: 150px; font-weight: 700; color: #64748b; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="px-3 mb-4"><h3>RevHire</h3></div>
    <nav>
        <a th:href="@{/employer/dashboard/{id}(id=${session.userId})}" class="nav-link"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
    </nav>
</aside>

<main class="main-content">
    <header class="d-flex justify-content-between align-items-center mb-5">
        <h2 class="fw-800">Company Profile</h2>
    </header>

    <div class="profile-card">
        <div class="company-icon"><i class="bi bi-building"></i></div>
        <h3 class="text-center fw-800 mb-4" th:text="${profile.companyName}">Company Name</h3>

        <div class="profile-details">
            <div class="detail-row"><span class="label">Industry</span> <span th:text="${profile.industry}">-</span></div>
            <div class="detail-row"><span class="label">Company Size</span> <span th:text="${profile.companySize}">-</span></div>
            <div class="detail-row"><span class="label">Website</span> <span th:text="${profile.website}">-</span></div>
            <div class="detail-row"><span class="label">Location</span> <span th:text="${profile.location}">-</span></div>
            <div class="detail-row border-0"><span class="label">Description</span> <span th:text="${profile.description}">-</span></div>
        </div>

        <div class="text-center mt-4">
            <a th:href="@{/employer/profile/edit}" class="btn btn-primary px-4 rounded-pill">
                <i class="bi bi-pencil-square me-2"></i>Edit Profile
            </a>        </div>
    </div>
</main>

</body>
</html>
