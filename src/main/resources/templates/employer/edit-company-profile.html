<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Company Profile | RevHire</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root { --primary: #2563eb; --bg-subtle: #f8fafc; --border: #e2e8f0; }
        body { background: var(--bg-subtle); font-family: 'Plus Jakarta Sans', sans-serif; padding: 3rem 1rem; }
        .edit-container { max-width: 700px; margin: 0 auto; }
        .form-card { background: white; border-radius: 24px; padding: 3rem; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .form-label { font-weight: 700; font-size: 0.85rem; color: #475569; }
        .form-control { border-radius: 12px; padding: 0.8rem 1rem; border: 1px solid var(--border); background: #f8fafc; }
        .back-link { color: #64748b; text-decoration: none; font-weight: 600; display: inline-flex; align-items: center; margin-bottom: 2rem; transition: 0.2s; }
        .back-link:hover { color: var(--primary); }
    </style>
</head>
<body>

<div class="edit-container">
    <a th:href="@{/employer/profile}" class="back-link">
        <i class="bi bi-arrow-left me-2"></i> Back to Profile
    </a>

    <div class="form-card">
        <h3 class="fw-800 mb-4">Edit Company Profile</h3>
        <form id="profileForm" th:object="${profile}">
            <div class="row g-3">
                <div class="col-12 mb-2">
                    <label class="form-label">Company Name</label>
                    <input type="text" th:field="*{companyName}" class="form-control" required>
                </div>
                <div class="col-md-6 mb-2">
                    <label class="form-label">Industry</label>
                    <input type="text" th:field="*{industry}" class="form-control">
                </div>
                <div class="col-md-6 mb-2">
                    <label class="form-label">Company Size</label>
                    <input type="text" th:field="*{companySize}" class="form-control">
                </div>
                <div class="col-12 mb-2">
                    <label class="form-label">Website URL</label>
                    <input type="url" th:field="*{website}" class="form-control" placeholder="https://">
                </div>
                <div class="col-12 mb-2">
                    <label class="form-label">Location</label>
                    <input type="text" th:field="*{location}" class="form-control">
                </div>
                <div class="col-12 mb-3">
                    <label class="form-label">About the Company</label>
                    <textarea th:field="*{description}" class="form-control" rows="5"></textarea>
                </div>
            </div>

            <button type="button" onclick="saveProfile()" class="btn btn-primary w-100 py-3 rounded-pill fw-bold mt-3" id="saveBtn">
                Save Changes
            </button>
        </form>
    </div>
</div>

<script th:inline="javascript">
    async function saveProfile() {
        const userId = [[${userId}]];
        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        btn.innerHTML = 'Saving...';

        const data = {
            companyName: document.querySelector('[name="companyName"]').value,
            industry: document.querySelector('[name="industry"]').value,
            companySize: document.querySelector('[name="companySize"]').value,
            website: document.querySelector('[name="website"]').value,
            location: document.querySelector('[name="location"]').value,
            description: document.querySelector('[name="description"]').value
        };

        const response = await fetch(`/employer/profile/${userId}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        if (response.ok) {
            window.location.href = "/employer/profile";
        } else {
            alert("Error updating profile.");
            btn.disabled = false;
            btn.innerHTML = 'Save Changes';
        }
    }
</script>

</body>
</html>
