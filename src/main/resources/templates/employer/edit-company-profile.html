<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Profile | RevHire</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root { --primary: #2563eb; --sidebar-bg: #0f172a; --bg-subtle: #f8fafc; }
        body { background: var(--bg-subtle); font-family: 'Plus Jakarta Sans', sans-serif; display: flex; }
        .sidebar { width: 250px; height: 100vh; background: var(--sidebar-bg); color: white; position: fixed; padding: 1.5rem 1rem; }
        .nav-link { color: #94a3b8; padding: 0.8rem 1rem; border-radius: 10px; display: flex; align-items: center; gap: 12px; text-decoration: none; margin-bottom: 5px; }
        .nav-link.active { background: var(--primary); color: white; }
        .main-content { margin-left: 250px; flex: 1; padding: 3rem; }
        .form-card { background: white; border-radius: 20px; padding: 3rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="px-3 mb-4"><h3>RevHire</h3></div>
    <nav>
        <a th:href="@{'/employer/dashboard/' + ${userId}}" class="nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
    </nav>
</aside>

<main class="main-content">
    <div class="form-card mx-auto" style="max-width: 600px;">
        <h4 class="mb-4 fw-800">Edit Company Profile</h4>

        <form id="profileForm" th:object="${profile}">
            <div class="mb-3">
                <label class="form-label fw-bold">Company Name</label>
                <input type="text" th:field="*{companyName}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Industry</label>
                <input type="text" th:field="*{industry}" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Company Size</label>
                <input type="text" th:field="*{companySize}" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Website</label>
                <input type="url" th:field="*{website}" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Location</label>
                <input type="text" th:field="*{location}" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Description</label>
                <textarea th:field="*{description}" class="form-control" rows="4"></textarea>
            </div>

            <button type="button" onclick="saveProfile()" class="btn btn-primary w-100 py-2 mt-3">Save Changes</button>
        </form>
    </div>
</main>

<script th:inline="javascript">
    async function saveProfile() {
        const userId = [[${userId}]]; // Injected by Thymeleaf
        const data = {
            companyName: document.querySelector('[name="companyName"]').value,
            industry: document.querySelector('[name="industry"]').value,
            companySize: document.querySelector('[name="companySize"]').value,
            website: document.querySelector('[name="website"]').value,
            location: document.querySelector('[name="location"]').value,
            description: document.querySelector('[name="description"]').value
        };

        const response = await fetch(`/employer/profile/${userId}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        if (response.ok) {
            alert("Profile updated successfully!");
            window.location.href = "/employer/profile";
        } else {
            alert("Error updating profile.");
        }
    }
</script>

</body>
</html>
