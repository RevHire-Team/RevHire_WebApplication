<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Jobs | RevHire</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root { --primary: #2563eb; --sidebar-bg: #0f172a; --bg-subtle: #f8fafc; --border: #e2e8f0; --text-main: #0f172a; }
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-subtle); color: var(--text-main); display: flex; min-height: 100vh; }

        /* Sidebar */
.logo {
    font-size: 1.5rem;
    font-weight: 800;
    padding: 0 1rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 10px;
    color: white;
    text-decoration: none;
}

.sidebar {
    width: 250px;
    height: 100vh;
    background: var(--sidebar-bg);
    color: white;
    position: fixed;
    padding: 1.5rem 1rem;
    display: flex;
    flex-direction: column; /* This keeps the logout button at the bottom */
}

.nav-menu {
    flex-grow: 1; /* Pushes the logout button to the bottom */
}        .nav-link { color: #94a3b8; padding: 0.8rem 1rem; border-radius: 12px; display: flex; align-items: center; gap: 12px; text-decoration: none; margin-bottom: 5px; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: var(--primary); color: white; }

        /* Main Content */
        .main-content { margin-left: 250px; flex: 1; padding: 3rem; }
        .table-card { background: white; border-radius: 20px; padding: 2rem; border: 1px solid var(--border); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .btn-action { width: 38px; height: 38px; display: inline-flex; align-items: center; justify-content: center; border-radius: 10px; border: none; transition: 0.2s; }
    </style>
</head>
<body>

<nav class="sidebar">
    <!-- Logo -->
    <a th:href="@{/employer/dashboard/{id}(id=${session.loggedInUser.userId})}" class="logo">
        <i class="bi bi-rocket-takeoff-fill text-primary"></i>
        <span>RevHire</span>
    </a>

    <!-- Navigation Menu -->
    <div class="nav-menu">
        <a th:href="@{/employer/dashboard/{id}(id=${session.loggedInUser.userId})}" class="nav-link active">
            <i class="bi bi-speedometer2"></i> <span>Dashboard</span>
        </a>
        <a th:href="@{/jobs/create}" class="nav-link">
            <i class="bi bi-plus-lg"></i> <span>Post New Job</span>
        </a>
        <a th:href="@{/jobs/manage}" class="nav-link">
            <i class="bi bi-building"></i> <span>Manage Jobs</span>
        </a>
        <a th:href="@{/applications/manage}" class="nav-link">
            <i class="bi bi-file-earmark-person"></i> <span>Manage Applications</span>
        </a>
        <a th:href="@{/employer/profile}" class="nav-link">
            <i class="bi bi-building"></i> <span>Company Profile</span>
        </a>
        <a th:href="@{/notifications/notification}" class="nav-link">
            <i class="bi bi-bell"></i> <span>Notifications</span>
        </a>
        <a th:href="@{/auth/reset-password}" class="nav-link">
            <i class="bi bi-key"></i> <span>Reset Password</span>
        </a>
    </div>

    <!-- Logout -->
    <div class="mt-auto">
        <a th:href="@{/auth/logout}" class="nav-link text-danger">
            <i class="bi bi-box-arrow-left"></i> <span>Logout</span>
        </a>
    </div>
</nav>

<main class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <h2 class="fw-800">Manage Jobs</h2>
        <a th:href="@{/jobs/create}" class="btn btn-primary px-4 py-2 rounded-pill fw-bold">
            <i class="bi bi-plus-lg me-2"></i> Post New Job
        </a>
    </div>

    <div class="table-card">
        <input type="hidden" id="employerId" th:value="${session.loggedInUser.userId}">
        <table class="table align-middle">
            <thead>
            <tr>
                <th>Job Title & Location</th>
                <th>Salary</th>
                <th>Status</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody id="jobTableBody">
            </tbody>
        </table>
    </div>
</main>

<!-- Add this modal at the end of your body -->
<div class="modal fade" id="deleteJobModal" tabindex="-1" aria-labelledby="deleteJobModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="deleteJobModalLabel">Confirm Delete</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                Are you sure you want to permanently delete this job?
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary rounded-pill" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger rounded-pill" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', fetchJobs);

    async function fetchJobs() {
        const userId = document.getElementById('employerId').value;
        const tbody = document.getElementById('jobTableBody');

        const response = await fetch(`/jobs/jobs/${userId}`);
        const jobs = await response.json();

        tbody.innerHTML = jobs.map(job => `
            <tr>
                <td>
                    <div class="fw-bold">${job.title}</div>
                    <small class="text-muted"><i class="bi bi-geo-alt"></i> ${job.location}</small>
                </td>
                <td>₹${job.salaryMin} - ₹${job.salaryMax}</td>
                <td><span class="badge ${job.status === 'OPEN' ? 'bg-success' : 'bg-secondary'}">${job.status}</span></td>
                <td class="text-end">
                    <a href="/jobs/jobs/edit/${job.jobId}" class="btn btn-action btn-outline-primary"><i class="bi bi-pencil"></i></a>
                    <button onclick="toggleStatus(${job.jobId})" class="btn btn-action btn-outline-success"><i class="bi bi-power"></i></button>
                    <button onclick="deleteJob(${job.jobId})" class="btn btn-action btn-outline-danger"><i class="bi bi-trash"></i></button>
                </td>
            </tr>
        `).join('');
    }

    // Add this variable at the top of your <script>
let jobIdToDelete = null;

// Initialize modal properly
document.addEventListener('DOMContentLoaded', () => {
    fetchJobs();
});

function deleteJob(id) {
    jobIdToDelete = id;
    const modalElement = document.getElementById('deleteJobModal');
    // Initialize/Show modal safely
    const deleteModal = new bootstrap.Modal(modalElement);
    deleteModal.show();
}

document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
    if (!jobIdToDelete) return;

    try {
        const response = await fetch(`/jobs/jobs/${jobIdToDelete}`, {
            method: 'DELETE'
        });

        if (response.ok) {
            // Close the modal correctly
            const modalElement = document.getElementById('deleteJobModal');
            const modalInstance = bootstrap.Modal.getInstance(modalElement);
            modalInstance.hide();

            // Cleanup and Refresh
            jobIdToDelete = null;
            fetchJobs();
        } else {
            console.error("Delete failed");
        }
    } catch (error) {
        console.error("Error:", error);
    }
});

    async function toggleStatus(jobId) {
    try {
        // Ensure this matches the @PutMapping path in your controller
        const response = await fetch(`/jobs/jobs/toggle/${jobId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' }
        });

        if (response.ok) {
            // Refresh the table to show the updated status badge
            fetchJobs();
        } else {
            alert("Failed to update status");
        }
    } catch (error) {
        console.error("Error toggling status:", error);
    }
}
</script>
</body>
</html>
