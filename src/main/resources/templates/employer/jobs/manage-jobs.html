<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Jobs | RevHire</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root { --primary: #2563eb; --sidebar-bg: #0f172a; --bg-subtle: #f8fafc; --border: #e2e8f0; --text-main: #0f172a; }
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-subtle); color: var(--text-main); display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar { width: 250px; background: var(--sidebar-bg); color: white; position: fixed; height: 100vh; padding: 1.5rem 1rem; }
        .nav-link { color: #94a3b8; padding: 0.8rem 1rem; border-radius: 12px; display: flex; align-items: center; gap: 12px; text-decoration: none; margin-bottom: 5px; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: var(--primary); color: white; }

        /* Main Content */
        .main-content { margin-left: 250px; flex: 1; padding: 3rem; }
        .table-card { background: white; border-radius: 20px; padding: 2rem; border: 1px solid var(--border); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .btn-action { width: 38px; height: 38px; display: inline-flex; align-items: center; justify-content: center; border-radius: 10px; border: none; transition: 0.2s; }
    </style>
</head>
<body>

<nav class="sidebar">
    <a th:href="@{/employer/dashboard/{id}(id=${session.loggedInUser.userId})}" class="logo">
        <i class="bi bi-rocket-takeoff-fill text-primary"></i>
        <span>RevHire</span>
    </a>
    <div class="nav-menu">
        <a th:href="@{/employer/dashboard/{id}(id=${session.loggedInUser.userId})}" class="nav-link active">
            <i class="bi bi-speedometer2"></i> <span>Dashboard</span>
        </a>
        <a th:href="@{/employer/jobs/create}" class="nav-link">
            <i class="bi bi-plus-circle"></i> <span>Post a Job</span>
        </a>
        <a th:href="@{/employer/profile}" class="nav-link">
            <i class="bi bi-building"></i> <span>Manage Jobs</span>
        </a>
        <a th:href="@{/employer/applications/all}" class="nav-link">
            <i class="bi bi-file-earmark-person"></i> <span>Applications</span>
        </a>
        <a th:href="@{/employer/profile}" class="nav-link">
            <i class="bi bi-building"></i> <span>Company Profile</span>
        </a>
    </div>
    <div class="mt-auto">
        <a th:href="@{/auth/logout}" class="nav-link text-danger">
            <i class="bi bi-box-arrow-left"></i> <span>Logout</span>
        </a>
    </div>
</nav>

<main class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <h2 class="fw-800">Manage Jobs</h2>
        <a th:href="@{/jobs/jobs/create}" class="btn btn-primary px-4 py-2 rounded-pill fw-bold">
            <i class="bi bi-plus-lg me-2"></i> Post New Job
        </a>
    </div>

    <div class="table-card">
        <input type="hidden" id="employerId" th:value="${session.loggedInUser.userId}">
        <table class="table align-middle">
            <thead>
            <tr>
                <th>Job Title & Location</th>
                <th>Salary</th>
                <th>Status</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody id="jobTableBody">
            </tbody>
        </table>
    </div>
</main>

<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', fetchJobs);

    async function fetchJobs() {
        const userId = document.getElementById('employerId').value;
        const tbody = document.getElementById('jobTableBody');

        const response = await fetch(`/jobs/jobs/${userId}`);
        const jobs = await response.json();

        tbody.innerHTML = jobs.map(job => `
            <tr>
                <td>
                    <div class="fw-bold">${job.title}</div>
                    <small class="text-muted"><i class="bi bi-geo-alt"></i> ${job.location}</small>
                </td>
                <td>₹${job.salaryMin} - ₹${job.salaryMax}</td>
                <td><span class="badge ${job.status === 'OPEN' ? 'bg-success' : 'bg-secondary'}">${job.status}</span></td>
                <td class="text-end">
                    <a href="/jobs/jobs/edit/${job.jobId}" class="btn btn-action btn-outline-primary"><i class="bi bi-pencil"></i></a>
                    <button onclick="toggleStatus(${job.jobId})" class="btn btn-action btn-outline-success"><i class="bi bi-power"></i></button>
                    <button onclick="deleteJob(${job.jobId})" class="btn btn-action btn-outline-danger"><i class="bi bi-trash"></i></button>
                </td>
            </tr>
        `).join('');
    }

    async function deleteJob(id) {
        if(confirm('Permanently delete this job?')) {
            await fetch(`/jobs/${id}`, { method: 'DELETE' });
            fetchJobs();
        }
    }
</script>
</body>
</html>
