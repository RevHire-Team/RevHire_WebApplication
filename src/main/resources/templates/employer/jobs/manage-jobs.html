<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Jobs | RevHire</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --bg-subtle: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --white: #ffffff;
            --border: #e2e8f0;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            background: var(--bg-subtle);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding-bottom: 50px;
        }

        .header-box {
            background: var(--white);
            padding: 1.5rem 2rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-box {
            background: var(--white);
            padding: 1.5rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--card-shadow);
        }

        .table thead th {
            background-color: #f1f5f9;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            border: none;
            padding: 1rem;
        }

        .table tbody td {
            padding: 1.2rem 1rem;
            vertical-align: middle;
            border-bottom: 1px solid #f1f5f9;
        }

        .badge-status {
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.75rem;
        }

        .badge-open { background: #ecfdf5; color: var(--success); }
        .badge-closed { background: #fef2f2; color: var(--danger); }

        /* Action Button Styling */
        .btn-action {
            width: 38px;
            height: 38px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            transition: all 0.2s;
            border: 1px solid transparent;
            text-decoration: none;
        }

        .btn-edit {
            background: #eff6ff; color: var(--primary); border-color: #dbeafe;
        }
        .btn-edit:hover { background: var(--primary); color: white; }

        .btn-status {
            background: #f0fdf4; color: #16a34a; border-color: #dcfce7;
        }
        .btn-status:hover { background: #16a34a; color: white; }

        .btn-delete {
            background: #fef2f2; color: var(--danger); border-color: #fee2e2;
        }
        .btn-delete:hover { background: var(--danger); color: white; }

        .btn-primary-custom {
            background: var(--primary);
            color: white;
            font-weight: 700;
            border-radius: 12px;
            padding: 12px 24px;
            border: none;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-primary-custom:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            color: white;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="header-box">
        <div>
            <h2 class="fw-800 mb-1">Manage Your Jobs 💼</h2>
            <p class="text-muted mb-0">Monitor your active listings and manage applicant flow.</p>
        </div>
        <a th:href="@{/jobs/jobs/create}" class="btn-primary-custom">
            <i class="bi bi-plus-lg me-2"></i> Post New Job
        </a>
    </div>

    <div class="table-box">
        <input type="hidden" id="employerId" th:value="${session.userId}">

        <table class="table">
            <thead>
            <tr>
                <th>Job Title & Location</th>
                <th>Salary Range</th>
                <th>Job Type</th>
                <th>Status</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody id="jobTableBody">
            <tr>
                <td colspan="5" class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2 text-muted">Loading your postings...</p>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="mt-4">
        <a th:href="@{'/employer/dashboard/' + ${session.userId}}" class="btn btn-link text-decoration-none text-muted fw-bold">
            <i class="bi bi-arrow-left me-2"></i> Back to Dashboard Overview
        </a>
    </div>
</div>

<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', fetchJobs);

    async function fetchJobs() {
        const userId = document.getElementById('employerId').value;
        const tbody = document.getElementById('jobTableBody');

        try {
            // This calls your @GetMapping("/jobs/{userId}")
            const response = await fetch(`/jobs/jobs/${userId}`);
            const jobs = await response.json();

            if (jobs.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center py-5 text-muted">No jobs found. Start by posting your first job!</td></tr>`;
                return;
            }

            tbody.innerHTML = jobs.map(job => `
                <tr>
                    <td>
                        <div class="fw-bold text-dark">${job.title}</div>
                        <div class="small text-muted"><i class="bi bi-geo-alt me-1"></i>${job.location}</div>
                    </td>
                    <td>
                        <span class="text-dark fw-600">₹${job.salaryMin.toLocaleString()} - ₹${job.salaryMax.toLocaleString()}</span>
                    </td>
                    <td><span class="text-muted">${job.jobType}</span></td>
                    <td>
                        <span class="badge-status ${job.status === 'OPEN' ? 'badge-open' : 'badge-closed'}">
                            ${job.status}
                        </span>
                    </td>
                    <td class="text-end">
                        <a href="/jobs/jobs/edit/${job.jobId}" class="btn btn-action btn-edit me-1" title="Edit Posting">
                            <i class="bi bi-pencil-square"></i>
                        </a>

                        <button onclick="toggleStatus(${job.jobId})" class="btn btn-action btn-status me-1" title="Toggle Active/Inactive">
                            <i class="bi bi-power"></i>
                        </button>

                        <button onclick="deleteJob(${job.jobId})" class="btn btn-action btn-delete" title="Delete Permanent">
                            <i class="bi bi-trash3"></i>
                        </button>
                    </td>
                </tr>
            `).join('');

        } catch (error) {
            console.error('Error:', error);
            tbody.innerHTML = `<tr><td colspan="5" class="text-center text-danger py-4">Error loading data. Check console for details.</td></tr>`;
        }
    }

    async function deleteJob(id) {
        if (!confirm('Are you sure? This will permanently remove the job and all associated applications.')) return;

        try {
            const response = await fetch(`/jobs/${id}`, { method: 'DELETE' });
            if (response.ok) {
                fetchJobs(); // Refresh list immediately
            }
        } catch (error) {
            alert('Delete failed. Try again.');
        }
    }

    async function toggleStatus(id) {
        try {
            const response = await fetch(`/jobs/jobs/toggle/${id}`, { method: 'PUT' });
            if (response.ok) {
                fetchJobs(); // Refresh list to see updated status badge
            }
        } catch (error) {
            alert('Status update failed.');
        }
    }
</script>

</body>
</html>
