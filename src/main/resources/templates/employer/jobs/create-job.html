<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Post New Job | RevHire</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root { --primary: #2563eb; --primary-dark: #1e40af; --bg-subtle: #f8fafc; --text-main: #0f172a; --border: #e2e8f0; }
        body { background: var(--bg-subtle); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 50px; }
        .header-box { background: white; padding: 1.5rem 2rem; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 2rem; }
        .form-box { background: white; padding: 2.5rem; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; color: var(--primary); font-weight: 800; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
        .form-label { font-weight: 700; font-size: 0.9rem; }
        .form-control, .form-select { border-radius: 10px; padding: 0.75rem 1rem; border: 1px solid var(--border); }
        .btn-post { background: var(--primary); color: white; padding: 1rem; border-radius: 12px; font-weight: 800; border: none; width: 100%; transition: 0.3s; }
        .btn-post:hover { background: var(--primary-dark); }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="header-box">
        <h2 class="fw-800 mb-1">Post New Job 🚀</h2>
        <p class="text-muted mb-0">Fill in the details below to publish your job opportunity.</p>
    </div>

    <div class="form-box">
        <form id="createJobForm" onsubmit="handleCreate(event)">
            <div class="section-header"><i class="bi bi-info-circle-fill"></i> Core Details</div>
            <div class="row g-4">
                <div class="col-md-6"><label class="form-label">Job Title</label><input type="text" id="title" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">Location</label><input type="text" id="location" class="form-control" required></div>
                <div class="col-md-4"><label class="form-label">Job Type</label>
                    <select id="jobType" class="form-select">
                        <option value="Full-time">Full-time</option>
                        <option value="Part-time">Part-time</option>
                        <option value="Internship">Internship</option>
                        <option value="Contract">Contract</option>
                    </select>
                </div>
                <div class="col-md-4"><label class="form-label">Min Salary</label><input type="number" id="salaryMin" class="form-control"></div>
                <div class="col-md-4"><label class="form-label">Max Salary</label><input type="number" id="salaryMax" class="form-control"></div>
            </div>

            <div class="section-header mt-5"><i class="bi bi-card-text"></i> Requirements & Description</div>
            <div class="row g-4">
                <div class="col-md-6"><label class="form-label">Experience (Years)</label><input type="number" id="experienceRequired" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">Education</label><input type="text" id="educationRequired" class="form-control" required></div>
                <div class="col-md-12"><label class="form-label">Job Description</label><textarea id="description" class="form-control" rows="6" required></textarea></div>
            </div>

            <button type="submit" class="btn btn-post mt-5" id="postBtn">
                <i class="bi bi-plus-circle me-2"></i> Publish Job
            </button>
        </form>
    </div>
</div>

<script>
    async function handleCreate(event) {
        event.preventDefault();
        const userId = [[${session.loggedInUser.id}]]; // Securely from session
        const btn = document.getElementById('postBtn');
        btn.disabled = true;

        const payload = {
            title: document.getElementById('title').value,
            location: document.getElementById('location').value,
            jobType: document.getElementById('jobType').value,
            salaryMin: parseFloat(document.getElementById('salaryMin').value),
            salaryMax: parseFloat(document.getElementById('salaryMax').value),
            experienceRequired: parseInt(document.getElementById('experienceRequired').value),
            educationRequired: document.getElementById('educationRequired').value,
            description: document.getElementById('description').value
        };

        const response = await fetch(`/jobs/create/${userId}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (response.ok) {
            alert("Job posted successfully!");
            window.location.href = "/jobs/jobs/manage";
        } else {
            alert("Failed to post job.");
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
