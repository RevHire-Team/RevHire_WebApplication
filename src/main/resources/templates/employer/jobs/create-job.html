<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Post New Job | RevHire</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root { --primary: #2563eb; --primary-dark: #1e40af; --bg-subtle: #f8fafc; --text-main: #0f172a; --border: #e2e8f0; }
        body { background: var(--bg-subtle); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 50px; }
        .header-box { background: white; padding: 1.5rem 2rem; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 2rem; }
        .form-box { background: white; padding: 2.5rem; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; color: var(--primary); font-weight: 800; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
        .form-label { font-weight: 700; font-size: 0.9rem; }
        .form-control, .form-select { border-radius: 10px; padding: 0.75rem 1rem; border: 1px solid var(--border); }
        .btn-post { background: var(--primary); color: white; padding: 1rem; border-radius: 12px; font-weight: 800; border: none; width: 100%; transition: 0.3s; }
        .btn-post:hover { background: var(--primary-dark); }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="mb-4">
        <a th:href="@{'/employer/dashboard/' + ${session.loggedInUser.userId}}" class="text-decoration-none fw-bold text-primary">
            <i class="bi bi-arrow-left me-2"></i> Back to Dashboard
        </a>
    </div>
    <div class="header-box">
        <h2 class="fw-800 mb-1">Post New Job 🚀</h2>
        <p class="text-muted mb-0">Fill in the details below to publish your job opportunity.</p>
    </div>

    <div class="form-box">
        <form id="createJobForm" onsubmit="handleCreate(event)">
            <div class="section-header"><i class="bi bi-info-circle-fill"></i> Core Details</div>
            <div class="row g-4">
                <div class="col-md-6"><label class="form-label">Job Title</label><input type="text" id="title" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">Location</label><input type="text" id="location" class="form-control" required></div>
                <div class="col-md-4"><label class="form-label">Job Type</label>
                    <select id="jobType" class="form-select">
                        <option value="Full-time">Full-time</option>
                        <option value="Part-time">Part-time</option>
                        <option value="Internship">Internship</option>
                        <option value="Contract">Contract</option>
                    </select>
                </div>
                <div class="col-md-4"><label class="form-label">Min Salary</label><input type="number" id="salaryMin" class="form-control"></div>
                <div class="col-md-4"><label class="form-label">Max Salary</label><input type="number" id="salaryMax" class="form-control"></div>
            </div>

            <div class="section-header mt-5"><i class="bi bi-card-text"></i> Requirements & Description</div>
            <div class="row g-4">
                <div class="col-md-6"><label class="form-label">Experience (Years)</label><input type="number" id="experienceRequired" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">Education</label><input type="text" id="educationRequired" class="form-control" required></div>
                <div class="col-md-12"><label class="form-label">Job Description</label><textarea id="description" class="form-control" rows="6" required></textarea></div>
            </div>

            <button type="submit" class="btn btn-post mt-5" id="postBtn">
                <i class="bi bi-plus-circle me-2"></i> Publish Job
            </button>
        </form>
    </div>
</div>

<div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 border-0 shadow">
            <div class="modal-body text-center p-4">
                <div class="text-success fs-1 mb-3"><i class="bi bi-check-circle-fill"></i></div>
                <h5>Job Posted Successfully!</h5>
                <p class="text-muted">Your job is now live for candidates to view.</p>
                <a href="/jobs/manage" class="btn btn-primary rounded-pill w-100 mt-3">View Manage Jobs</a>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="errorModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 border-0 shadow">
            <div class="modal-body text-center p-4">
                <div class="text-danger fs-1 mb-3"><i class="bi bi-x-circle-fill"></i></div>
                <h5>Something went wrong</h5>
                <p class="text-muted" id="errorMessage">Unable to publish your job. Please try again.</p>
                <button type="button" class="btn btn-secondary rounded-pill w-100 mt-3" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    async function handleCreate(event) {
        event.preventDefault();

        const btn = document.getElementById('postBtn');
        const userId = [[${session.loggedInUser.userId}]];

        // Disable button immediately
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Publishing...';

        const payload = {
            title: document.getElementById('title').value,
            location: document.getElementById('location').value,
            jobType: document.getElementById('jobType').value,
            salaryMin: parseFloat(document.getElementById('salaryMin').value) || 0,
            salaryMax: parseFloat(document.getElementById('salaryMax').value) || 0,
            experienceRequired: parseInt(document.getElementById('experienceRequired').value) || 0,
            educationRequired: document.getElementById('educationRequired').value,
            description: document.getElementById('description').value
        };

        try {
            const response = await fetch(`/jobs/create/${userId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                // SUCCESS: Show Modal
                new bootstrap.Modal(document.getElementById('successModal')).show();
            } else {
                throw new Error("Failed to post");
            }
        } catch (error) {
            // ERROR: Show Modal
            new bootstrap.Modal(document.getElementById('errorModal')).show();
        } finally {
            // Always reset button if it fails, or leave it if success
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-plus-circle me-2"></i> Publish Job';
        }
    }
</script>
</body>
</html>
