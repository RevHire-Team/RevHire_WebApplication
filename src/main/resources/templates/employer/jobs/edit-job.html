<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Job | RevHire</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --bg-subtle: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --white: #ffffff;
            --border: #e2e8f0;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        body {
            background: var(--bg-subtle);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding-bottom: 50px;
        }

        .header-box {
            background: var(--white);
            padding: 1.5rem 2rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .form-box {
            background: var(--white);
            padding: 2.5rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--card-shadow);
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.5rem;
            color: var(--primary);
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .form-label { font-weight: 700; font-size: 0.9rem; color: var(--text-main); }

        .form-control, .form-select {
            border-radius: 10px;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            background-color: #fdfdfd;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .info-box {
            background: #f1f5f9;
            border-radius: 8px;
            padding: 5px 12px;
            font-size: 0.85rem;
            color: var(--text-muted);
            display: inline-block;
            margin-bottom: 10px;
        }

        .btn-update {
            background: var(--primary);
            color: white;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 800;
            border: none;
            transition: 0.3s;
        }

        .btn-update:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="header-box">
        <div>
            <h2 class="fw-800 mb-1">Edit Job Posting ✍️</h2>
            <p class="text-muted mb-0">Modify the details of your listing below.</p>
        </div>
        <a th:href="@{/jobs/manage}" class="btn btn-outline-secondary rounded-pill px-4">
            <i class="bi bi-x-lg me-2"></i> Cancel
        </a>
    </div>

    <div class="form-box">
        <div class="info-box">
            <i class="bi bi-hash"></i> Job ID: <span th:text="${jobId}" id="displayJobId"></span>
        </div>

        <form id="editJobForm">
            <input type="hidden" id="jobId" th:value="${jobId}">

            <div class="section-header">
                <i class="bi bi-info-circle-fill"></i> Core Details
            </div>

            <div class="row g-4">
                <div class="col-md-6">
                    <label class="form-label">Job Title</label>
                    <input type="text" id="title" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Location</label>
                    <input type="text" id="location" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Job Type</label>
                    <select id="jobType" class="form-select">
                        <option value="">Select</option>
                        <option value="Full-time">Full-time</option>
                        <option value="Part-time">Part-time</option>
                        <option value="Internship">Internship</option>
                        <option value="Contract">Contract</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Min Salary</label>
                    <input type="number" id="salaryMin" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Max Salary</label>
                    <input type="number" id="salaryMax" class="form-control">
                </div>
            </div>

            <div class="section-header mt-5">
                <i class="bi bi-card-text"></i> Requirements & Description
            </div>

            <div class="row g-4">
                <div class="col-md-6">
                    <label class="form-label">Experience (Years)</label>
                    <input type="number" id="experienceRequired" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Education</label>
                    <input type="text" id="educationRequired" class="form-control">
                </div>
                <div class="col-md-12">
                    <label class="form-label">Job Description</label>
                    <textarea id="description" class="form-control" rows="6"></textarea>
                </div>
            </div>

            <button type="submit" class="btn btn-update w-100 mt-5" id="updateBtn">
                <i class="bi bi-check-all me-2"></i> Save Changes
            </button>
        </form>
    </div>
</div>

<!-- Toast for update notification -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
    <div id="updateToast" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body" id="toastMessage">Job updated successfully!</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', loadJobData);

    async function loadJobData() {
        const jobId = document.getElementById('jobId').value;
        try {
            const response = await fetch(`/jobs/get/${jobId}`);
            const job = await response.json();

            document.getElementById('title').value = job.title || '';
            document.getElementById('location').value = job.location || '';
            document.getElementById('jobType').value = job.jobType || '';
            document.getElementById('salaryMin').value = job.salaryMin || '';
            document.getElementById('salaryMax').value = job.salaryMax || '';
            document.getElementById('experienceRequired').value = job.experienceRequired || '';
            document.getElementById('educationRequired').value = job.educationRequired || '';
            document.getElementById('description').value = job.description || '';
        } catch (err) {
            console.error("Error loading job:", err);
        }
    }

    document.getElementById('editJobForm').addEventListener('submit', async function(event) {
        event.preventDefault();
        const btn = document.getElementById('updateBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Updating...';

        const jobId = document.getElementById('jobId').value;
        const payload = {
            title: document.getElementById('title').value || null,
            location: document.getElementById('location').value || null,
            jobType: document.getElementById('jobType').value || null,
            salaryMin: document.getElementById('salaryMin').value ? parseFloat(document.getElementById('salaryMin').value) : null,
            salaryMax: document.getElementById('salaryMax').value ? parseFloat(document.getElementById('salaryMax').value) : null,
            experienceRequired: document.getElementById('experienceRequired').value ? parseInt(document.getElementById('experienceRequired').value) : null,
            educationRequired: document.getElementById('educationRequired').value || null,
            description: document.getElementById('description').value || null
        };

        try {
            const response = await fetch(`/jobs/update/${jobId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                // Show Bootstrap toast
                const toastEl = document.getElementById('updateToast');
                const toast = new bootstrap.Toast(toastEl);
                document.getElementById('toastMessage').innerText = "Job updated successfully!";
                toast.show();

                // Redirect after 1.5 sec
                setTimeout(() => { window.location.href = '/jobs/manage'; }, 1500);
            }
        } catch (err) {
            console.error(err);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-check-all me-2"></i> Save Changes';
        }
    });
</script>

</body>
</html>
