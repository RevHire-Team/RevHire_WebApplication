<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Applications | RevHire</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .table-card { background: #fff; border-radius: 20px; padding: 2rem; border: 1px solid #e2e8f0; }
        .btn-action { width: 38px; height: 38px; display: inline-flex; align-items: center; justify-content: center; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container my-5">
    <h2 class="fw-800 mb-4">Manage Applications</h2>
    <div class="table-card">
        <table class="table align-middle">
            <thead>
            <tr>
                <th>Job Title</th>
                <th>Applicant</th>
                <th>Status</th>
                <th>Applied On</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="app : ${applications}">
                <td th:text="${app.jobTitle}">Job</td>
                <td th:text="${app.seekerName}">Name</td>
                <td>
                    <span class="badge"
                          th:classappend="${app.status == 'ACCEPTED' ? 'bg-success' : (app.status == 'REJECTED' ? 'bg-danger' : 'bg-secondary')}"
                          th:text="${app.status}">Status</span>
                </td>
                <td th:text="${#temporals.format(app.appliedOn, 'dd-MM-yyyy')}">Date</td>
                <td class="text-end">
                    <button class="btn btn-action btn-outline-primary"
                            th:onclick="openStatusModal([[${app.applicationId}]], [[${app.status}]])">
                        <i class="bi bi-pencil"></i>
                    </button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="updateStatusModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Update Status</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <select id="statusSelect" class="form-select">
                    <option value="PENDING">Pending</option>
                    <option value="REVIEWED">Reviewed</option>
                    <option value="ACCEPTED">Accepted</option>
                    <option value="REJECTED">Rejected</option>
                </select>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary rounded-pill" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary rounded-pill" id="confirmStatusBtn">Update</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let selectedId = null;
    let modal = new bootstrap.Modal(document.getElementById('updateStatusModal'));

    function openStatusModal(id, status) {
        selectedId = id;
        document.getElementById('statusSelect').value = status;
        modal.show();
    }

    document.getElementById('confirmStatusBtn').addEventListener('click', async () => {
        const status = document.getElementById('statusSelect').value;
        await fetch(`/applications/update-status/${selectedId}?status=${status}`, { method: 'POST' });
        window.location.reload(); // Refresh to see updated Thymeleaf-rendered table
    });
</script>
</body>
</html>
