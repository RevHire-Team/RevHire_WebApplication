<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Manage Applications | RevHire</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --primary: #2563eb;
            --bg-subtle: #f8fafc;
            --text-main: #0f172a;
            --white: #ffffff;
            --border: #e2e8f0;
        }

        body {
            background: var(--bg-subtle);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-main);
        }

        .header-box, .filter-box, .table-box {
            background: var(--white);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            margin-bottom: 24px;
        }

        .table thead th {
            background-color: #f1f5f9;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            font-weight: 700;
            color: #64748b;
            border: none;
        }

        .badge-status {
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.75rem;
        }

        .btn-action {
            width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: 0.2s;
        }
    </style>
</head>

<body>

<div class="container mt-4">
    <input type="hidden" id="employerId" th:value="${session.userId}">

    <div class="header-box d-flex justify-content-between align-items-center">
        <div>
            <h3 class="fw-800 mb-1">
                Manage Applications
                <span class="badge bg-danger ms-2" id="notificationCount">0</span>
            </h3>
            <p class="text-muted mb-0">Review candidate profiles and update their hiring status.</p>
        </div>
        <a th:href="@{/jobs/jobs/manage}" class="btn btn-outline-secondary fw-bold">
            <i class="bi bi-arrow-left me-2"></i> Back to Jobs
        </a>
    </div>

    <div class="filter-box">
        <h6 class="fw-bold mb-3"><i class="bi bi-funnel me-2"></i>Smart Filter</h6>
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label small fw-bold">Search Candidate or Job</label>
                <input type="text" id="filterKeyword" class="form-control" placeholder="Name, Email, or Title...">
            </div>
            <div class="col-md-4">
                <label class="form-label small fw-bold">Application Status</label>
                <select id="filterStatus" class="form-select">
                    <option value="">All Statuses</option>
                    <option value="APPLIED">Applied</option>
                    <option value="SHORTLISTED">Shortlisted</option>
                    <option value="REJECTED">Rejected</option>
                </select>
            </div>
            <div class="col-md-4 d-flex align-items-end">
                <button class="btn btn-primary w-100 fw-bold" onclick="filterApplicants()">
                    <i class="bi bi-search me-2"></i> Apply Filters
                </button>
            </div>
        </div>
    </div>

    <div class="table-box">
        <table class="table align-middle">
            <thead>
            <tr>
                <th>Candidate Details</th>
                <th>Applied For</th>
                <th>Date Applied</th>
                <th>Status</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody id="appTable">
            <tr>
                <td colspan="5" class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2 text-muted">Fetching applications...</p>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="detailsModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">Candidate Application</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="modalContent">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/employer.js}"></script>

</body>
</html>
