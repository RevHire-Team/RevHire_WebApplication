<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Notifications | RevHire</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --primary: #2563eb;
            --sidebar-bg: #0f172a;
            --bg-subtle: #f8fafc;
            --border: #e2e8f0;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-subtle); display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar {
            width: 250px; height: 100vh; background: var(--sidebar-bg); color: white;
            position: fixed; padding: 1.5rem 1rem;
        }
        .logo {
            font-size: 1.5rem; font-weight: 800; padding: 0 1rem 1.5rem;
            display: flex; align-items: center; gap: 10px; color: white; text-decoration: none;
        }
        .nav-link {
            color: #94a3b8; text-decoration: none; padding: 0.7rem 1rem; border-radius: 10px;
            display: flex; align-items: center; gap: 12px; font-weight: 500; margin-bottom: 2px;
        }
        .nav-link.active { background: var(--primary); color: white; }

        /* Main Content */
        .main-content { margin-left: 250px; flex: 1; padding: 2.5rem; }

        .notification-card {
            background: white; border-radius: 12px; border: 1px solid var(--border);
            padding: 1.25rem; margin-bottom: 0.75rem; display: flex; align-items: flex-start;
            gap: 15px; transition: all 0.2s; position: relative;
        }

        .notification-card.unread {
            border-left: 4px solid var(--primary);
            background: #f0f7ff;
        }

        .icon-circle {
            width: 40px; height: 40px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .unread .icon-circle { background: var(--primary); color: white; }
        .read .icon-circle { background: var(--border); color: #64748b; }

        .btn-read { font-size: 0.75rem; font-weight: 700; color: var(--primary); cursor: pointer; border: none; background: none; }
        .btn-read:hover { text-decoration: underline; }
    </style>
</head>
<body>

<nav class="sidebar">
    <a th:href="@{/jobseeker/dashboard}" class="logo">
        <i class="bi bi-rocket-takeoff-fill text-primary"></i> <span>RevHire</span>
    </a>
    <div class="nav-menu">
        <a th:href="@{/jobseeker/dashboard}" class="nav-link">
            <i class="bi bi-speedometer2"></i> <span>Dashboard</span>
        </a>
        <a th:href="@{/notifications/notification}" class="nav-link active">
            <i class="bi bi-bell"></i> <span>Notifications</span>
        </a>
    </div>
</nav>

<main class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-800 mb-0">Notifications</h3>
            <p class="text-muted small">Stay updated with your application status</p>
        </div>
        <button class="btn btn-outline-primary btn-sm rounded-pill px-3" onclick="loadNotifications()">
            <i class="bi bi-arrow-clockwise"></i> Refresh
        </button>
    </div>

    <div id="notificationList">
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
        </div>
    </div>

    <input type="hidden" id="userId" th:value="${session.userId}">
</main>

<script>
    const userId = document.getElementById('userId').value;

    async function loadNotifications() {
        const response = await fetch(`/notifications/api/${userId}`);
        const notifications = await response.json();
        const list = document.getElementById('notificationList');

        if (notifications.length === 0) {
            list.innerHTML = `<div class="text-center py-5"><i class="bi bi-bell-slash text-muted fs-1"></i><p class="mt-2 text-muted">No notifications yet.</p></div>`;
            return;
        }

        list.innerHTML = notifications.map(n => `
            <div class="notification-card ${n.isRead ? 'read' : 'unread'}" id="notif-${n.notificationId}">
                <div class="icon-circle">
                    <i class="bi ${n.isRead ? 'bi-bell' : 'bi-bell-fill'}"></i>
                </div>
                <div class="flex-grow-1">
                    <p class="mb-1 fw-500">${n.message}</p>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="text-muted" style="font-size: 0.7rem;">Update Received</span>
                        ${!n.isRead ? `<button class="btn-read" onclick="markAsRead(${n.notificationId})">Mark as read</button>` : ''}
                    </div>
                </div>
            </div>
        `).join('');
    }

    async function markAsRead(id) {
        const response = await fetch(`/notifications/api/${id}/read`, { method: 'PUT' });
        if (response.ok) {
            const card = document.getElementById(`notif-${id}`);
            card.classList.remove('unread');
            card.classList.add('read');
            // Refresh list to remove the button
            loadNotifications();
        }
    }

    // Initial Load
    document.addEventListener('DOMContentLoaded', loadNotifications);
</script>

</body>
</html>
