<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Profile | RevHire</title>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    :root {
      --primary: #2563eb;
      --sidebar: #0f172a;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
    }

    body {
      background: var(--bg);
      font-family: 'Plus Jakarta Sans', sans-serif;
      display: flex;
      margin: 0;
    }

    /* Sidebar */
    .sidebar {
      width: 250px;
      height: 100vh;
      background: var(--sidebar);
      color: white;
      position: fixed;
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 30px;
      text-decoration: none;
      color: white;
    }

    .nav-link {
      color: #94a3b8;
      padding: 10px 14px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
      text-decoration: none;
      font-weight: 500;
    }

    .nav-link:hover,
    .nav-link.active {
      background: var(--primary);
      color: white;
    }

    .mt-auto {
      margin-top: auto;
    }

    /* Main Content */
    .main {
      margin-left: 250px;
      width: calc(100% - 250px);
      padding: 40px 50px;
    }

    .profile-header {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 30px 35px;
      box-shadow: var(--shadow);
      display: flex;
      gap: 25px;
      align-items: center;
      margin-bottom: 35px;
    }

    .avatar {
      width: 120px;
      height: 120px;
      background: var(--primary);
      color: white;
      font-size: 42px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 20px;
    }

    .profile-header h2 {
      font-size: 1.8rem;
      margin-bottom: 5px;
    }

    .profile-header p {
      margin: 0;
      color: #6b7280;
    }

    .btn-primary {
      border-radius: 12px;
      padding: 8px 20px;
      font-weight: 600;
    }

    /* Card box */
    .card-box {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 30px;
      box-shadow: var(--shadow);
      margin-bottom: 30px;
    }

    .section-title {
      font-size: 0.85rem;
      font-weight: 800;
      color: #64748b;
      text-transform: uppercase;
      margin-bottom: 20px;
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 5px;
    }

    .data-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: #64748b;
      margin-top: 15px;
    }

    .data-value {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 12px;
      color: #111827;
    }

    hr {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 25px 0;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<nav class="sidebar">
  <a th:href="@{'/jobseeker/dashboard/' + ${session.userId}}" class="logo">
    <i class="bi bi-rocket-takeoff-fill text-primary"></i>
    <span>RevHire</span>
  </a>

  <div class="nav-menu">
    <a th:href="@{'/jobseeker/dashboard/' + ${session.userId}}" class="nav-link">
      <i class="bi bi-speedometer2"></i> Dashboard
    </a>
    <a th:href="@{/jobseeker/profile/manage}" class="nav-link active">
      <i class="bi bi-pencil"></i> Manage Profile
    </a>
    <a th:href="@{/jobseeker/resume/builder}" class="nav-link">
      <i class="bi bi-file-earmark-text"></i> Resume Builder
    </a>
    <a th:href="@{/jobseeker/resume/view}" class="nav-link">
      <i class="bi bi-eye"></i> View Resume
    </a>
    <a th:href="@{/jobseeker/resume/upload}" class="nav-link">
      <i class="bi bi-upload"></i> Upload Resume
    </a>
    <a th:href="@{/jobseeker/jobs/search}" class="nav-link">
      <i class="bi bi-search"></i> Search Jobs
    </a>
    <a th:href="@{/jobseeker/applications}" class="nav-link">
      <i class="bi bi-briefcase"></i> Applications
    </a>
    <a th:href="@{/jobseeker/jobs/saved}" class="nav-link">
      <i class="bi bi-heart"></i> Saved Jobs
    </a>
    <a th:href="@{/notifications/notification}" class="nav-link">
      <i class="bi bi-bell"></i> Notifications
    </a>
    <a th:href="@{/auth/reset-password}" class="nav-link">
      <i class="bi bi-key"></i> Reset Password
    </a>
  </div>

  <div class="mt-auto">
    <a th:href="@{/}" class="nav-link text-danger">
      <i class="bi bi-box-arrow-left"></i> Logout
    </a>
  </div>
</nav>

<!-- MAIN CONTENT -->
<div class="main">

  <!-- Profile Header -->
  <div class="profile-header">
    <div class="avatar" th:text="${session.userInitial ?: 'U'}">U</div>
    <div>
      <h2 id="display-name">User</h2>
      <p id="display-title" class="text-muted">Job Seeker</p>
      <a th:href="@{/jobseeker/edit-profile}" class="btn btn-primary">
        <i class="bi bi-pencil"></i> Edit Profile
      </a>
    </div>
  </div>

  <!-- Personal Details Card -->
  <div class="card-box">
    <div class="section-title">Personal Details</div>

    <div class="data-label">Email</div>
    <div class="data-value" th:text="${session.userEmail}"></div>

    <div class="data-label">Phone</div>
    <div class="data-value" id="view-phone">Not Provided</div>

    <div class="data-label">Location</div>
    <div class="data-value" id="view-location">Not Set</div>

    <hr>

    <div class="section-title">Education</div>
    <div class="data-label">Education</div>
    <div class="data-value" id="view-education">Not Added</div>
  </div>

  <input type="hidden" id="userId" th:value="${session.userId}">

</div>

<script>
  document.addEventListener("DOMContentLoaded", async () => {
    const userId = document.getElementById("userId").value;
    if (!userId) return;

    try {
      const res = await fetch(`/api/jobseeker/profile/${userId}`);
      if (!res.ok) return;
      const profile = await res.json();

      document.getElementById("display-name").innerText = profile.fullName || "User";
      document.getElementById("display-title").innerText = profile.jobTitle || "Job Seeker";
      document.getElementById("view-phone").innerText = profile.phone || "Not Provided";
      document.getElementById("view-location").innerText = profile.location || "Not Set";
      document.getElementById("view-education").innerText = profile.education || "Not Added";
    } catch (err) {
      console.error("Error loading profile:", err);
    }
  });
</script>

</body>
</html>
