<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Search Jobs | RevHire</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        :root{
        --primary:#2563eb;
        --sidebar-bg:#0f172a;
        --bg-subtle:#f8fafc;
        --border:#e2e8f0;
        --text-main:#0f172a;
        --card-shadow:0 10px 25px -5px rgba(0,0,0,0.05);
        }

        *{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif;}

        body{
        background:var(--bg-subtle);
        color:var(--text-main);
        display:flex;
        min-height:100vh;
        }

        .sidebar{
        width:250px;
        height:100vh;
        background:var(--sidebar-bg);
        color:white;
        position:fixed;
        padding:1.5rem 1rem;
        display:flex;
        flex-direction:column;
        }

        .logo{
        font-size:1.5rem;
        font-weight:800;
        padding:0 1rem 1.5rem;
        display:flex;
        align-items:center;
        gap:10px;
        color:white;
        text-decoration:none;
        }

        .nav-menu{
        list-style:none;
        padding:0;
        flex-grow:1;
        overflow-y:auto;
        }

        .nav-link{
        color:#94a3b8;
        text-decoration:none;
        padding:0.7rem 1rem;
        border-radius:10px;
        display:flex;
        align-items:center;
        gap:12px;
        font-weight:500;
        transition:0.3s;
        margin-bottom:2px;
        }

        .nav-link:hover,
        .nav-link.active{
        background:var(--primary);
        color:white;
        }

        .main-content{
        margin-left:250px;
        flex:1;
        padding:2.5rem;
        width:calc(100% - 250px);
        }

        .filter-box{
        background:white;
        padding:2rem;
        border-radius:16px;
        border:1px solid var(--border);
        box-shadow:var(--card-shadow);
        margin-bottom:2rem;
        }

        .job-card{
        background:white;
        padding:1.8rem;
        border-radius:20px;
        border:1px solid var(--border);
        box-shadow:var(--card-shadow);
        margin-bottom:1.25rem;
        transition:all 0.3s ease;
        }

        .job-card:hover{
        transform:translateY(-5px);
        border-color:var(--primary);
        }

        .company-name{
        color:var(--primary);
        font-weight:700;
        font-size:0.85rem;
        text-transform:uppercase;
        }

        .job-title{
        font-weight:800;
        font-size:1.3rem;
        margin:0.4rem 0;
        }

        .job-meta{
        font-size:0.9rem;
        color:#64748b;
        display:flex;
        gap:20px;
        }

        .job-meta i{
        color:var(--primary);
        margin-right:5px;
        }

    </style>
</head>

<body>

<nav class="sidebar">

    <a th:href="@{'/jobseeker/dashboard/' + ${session.userId}}" class="logo">
        <i class="bi bi-rocket-takeoff-fill text-primary"></i>
        <span>RevHire</span>
    </a>

    <div class="nav-menu">

        <a th:href="@{'/jobseeker/dashboard/' + ${session.userId}}" class="nav-link">
            <i class="bi bi-speedometer2"></i> <span>Dashboard</span>
        </a>

        <a th:href="@{/jobseeker/profile/manage}" class="nav-link">
            <i class="bi bi-pencil"></i> <span>Manage Profile</span>
        </a>

        <a th:href="@{/jobseeker/resume/builder}" class="nav-link">
            <i class="bi bi-file-earmark-text"></i> <span>Resume Builder</span>
        </a>

        <a th:href="@{/jobseeker/resume/upload}" class="nav-link">
            <i class="bi bi-upload"></i> <span>Upload Resume</span>
        </a>

        <a th:href="@{/jobseeker/jobs/search}" class="nav-link active">
            <i class="bi bi-search"></i> <span>Search Jobs</span>
        </a>

    </div>

</nav>

<main class="main-content">

    <h3 class="fw-bold mb-4">Explore Opportunities</h3>

    <div class="filter-box">

        <form th:action="@{/jobs/search}" method="GET" class="row g-3">

            <div class="col-md-3">
                <label class="form-label small fw-bold text-muted">What</label>
                <input type="text" name="title" class="form-control" placeholder="Job title">
            </div>

            <div class="col-md-2">
                <label class="form-label small fw-bold text-muted">Where</label>
                <input type="text" name="location" class="form-control" placeholder="City">
            </div>

            <div class="col-md-2">
                <label class="form-label small fw-bold text-muted">Experience</label>
                <select name="experience" class="form-select">
                    <option value="">Any</option>
                    <option value="0">Fresher</option>
                    <option value="1">1+ Years</option>
                    <option value="3">3+ Years</option>
                    <option value="5">5+ Years</option>
                </select>
            </div>

            <div class="col-md-2">
                <label class="form-label small fw-bold text-muted">Min Salary</label>
                <input type="number" name="minSalary" class="form-control" placeholder="₹">
            </div>

            <div class="col-md-2">
                <label class="form-label small fw-bold text-muted">Max Salary</label>
                <input type="number" name="maxSalary" class="form-control" placeholder="₹">
            </div>

            <div class="col-md-2">
                <label class="form-label small fw-bold text-muted">Job Type</label>
                <select name="jobType" class="form-select">
                    <option value="">All</option>
                    <option value="FULL_TIME">Full Time</option>
                    <option value="PART_TIME">Part Time</option>
                    <option value="INTERNSHIP">Internship</option>
                    <option value="CONTRACT">Contract</option>
                </select>
            </div>

            <div class="col-md-2">
                <label class="form-label small fw-bold text-muted">Sort</label>
                <select name="sort" class="form-select">

                    <option value="">Sort Jobs</option>

                    <option value="company"
                            th:selected="${param.sort == 'company'}">
                        Company
                    </option>

                    <option value="salary"
                            th:selected="${param.sort == 'salary'}">
                        Salary
                    </option>

                    <option value="jobType"
                            th:selected="${param.sort == 'jobType'}">
                        Job Type
                    </option>

                </select>
            </div>

            <div class="col-md-1 d-flex align-items-end">
                <button type="submit" class="btn btn-primary w-100">Search</button>
            </div>

        </form>

    </div>


    <h4 class="fw-bold mb-3">Recommended Jobs</h4>

    <div id="recommendedJobs"></div>
    <div id="jobListings">

        <div th:each="job : ${jobs}" class="job-card">

            <span class="company-name" th:text="${job.companyName}"></span>

            <h5 class="job-title" th:text="${job.title}"></h5>

            <div class="job-meta">

<span>
<i class="bi bi-geo-alt"></i>
<span th:text="${job.location}"></span>
</span>

                <span>
<i class="bi bi-currency-dollar"></i>
<span th:text="${job.salaryMin + ' - ' + job.salaryMax}"></span>
</span>

                <span>
<i class="bi bi-clock"></i>
<span th:text="${job.jobType}"></span>
</span>

            </div>

            <div class="mt-3 d-flex gap-2">

                <button class="btn btn-outline-primary btn-sm"
                        th:onclick="'saveJob(' + ${job.jobId} + ')'">
                    <i class="bi bi-heart"></i> Save
                </button>

                <button class="btn btn-primary btn-sm"
                        th:onclick="'initiateApply(' + ${job.jobId} + ')'">
                    Apply
                </button>

            </div>

        </div>

    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>

    document.addEventListener("DOMContentLoaded", loadRecommendedJobs);

    async function loadRecommendedJobs(){

        const userId = [[${session.userId}]];

        try{

            const profileRes = await fetch(`/api/jobseeker/profile/${userId}`);
            const profile = await profileRes.json();

            if(!profile.skills) return;

            const firstSkill = profile.skills.split(",")[0].trim();

            const jobRes = await fetch(`/jobs/recommended/${firstSkill}`);
            const jobs = await jobRes.json();

            const container = document.getElementById("recommendedJobs");

            container.innerHTML = "";

            jobs.slice(0,3).forEach(job => {

                container.innerHTML += `

                <div class="job-card">

                    <span class="company-name">${job.companyName}</span>

                    <h5 class="job-title">${job.title}</h5>

                    <div class="job-meta">

                        <span>
                        <i class="bi bi-geo-alt"></i> ${job.location}
                        </span>

                        <span>
                        <i class="bi bi-currency-dollar"></i>
                        ${job.salaryMin} - ${job.salaryMax}
                        </span>

                        <span>
                        <i class="bi bi-clock"></i> ${job.jobType}
                        </span>

                    </div>

                </div>

                `;

            });

        }
        catch(e){
            console.error("Recommended jobs error",e);
        }

    }

</script>
</body>
</html>
