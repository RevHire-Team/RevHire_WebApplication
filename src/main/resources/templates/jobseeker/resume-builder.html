resume-builder.html code <!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Resume Builder | RevHire</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        :root{
            --primary:#2563eb;
            --sidebar-bg:#0f172a;
            --bg-subtle:#f8fafc;
            --border:#e2e8f0;
        }

        body{
            background:var(--bg-subtle);
            font-family:'Plus Jakarta Sans',sans-serif;
            display:flex;
        }

        .sidebar{
            width:250px;
            background:var(--sidebar-bg);
            color:white;
            height:100vh;
            position:fixed;
            padding:1.5rem 1rem;
        }

        .logo{
            font-size:1.4rem;
            font-weight:700;
            color:white;
            text-decoration:none;
        }

        .nav-link{
            color:#94a3b8;
            display:block;
            padding:.7rem 1rem;
            border-radius:10px;
            margin-bottom:4px;
            text-decoration:none;
        }

        .nav-link:hover{
            background:#2563eb;
            color:white;
        }

        .main-content{
            margin-left:250px;
            padding:2.5rem;
            width:100%;
        }

        .form-card{
            background:white;
            border-radius:18px;
            padding:30px;
            border:1px solid var(--border);
        }

        .dynamic-row{
            background:#f1f5f9;
            padding:15px;
            border-radius:12px;
            margin-bottom:12px;
            position:relative;
        }

        .btn-remove{
            position:absolute;
            right:10px;
            top:10px;
            color:red;
            cursor:pointer;
            font-weight:bold;
        }

    </style>

</head>

<body>

<nav class="sidebar">

    <a th:href="@{/jobseeker/dashboard}" class="logo">RevHire</a>

    <div class="mt-4">
        <a th:href="@{/jobseeker/resume/builder}" class="nav-link">Resume Builder</a>
        <a th:href="@{/jobseeker/resume/view}" class="nav-link">View Resume</a>
    </div>

</nav>


<main class="main-content">

    <div class="container" style="max-width:900px">

        <h2 class="mb-4">Professional Resume Builder</h2>

        <form id="resumeForm" class="form-card">

            <input type="hidden" id="userId" th:value="${session.userId}">

            <!-- Objective -->

            <div class="mb-4">
                <label class="form-label">Career Objective *</label>
                <textarea id="objective" class="form-control" rows="3" required></textarea>
            </div>


            <!-- Education -->

            <div class="mb-4">

                <div class="d-flex justify-content-between mb-2">
                    <label>Education</label>
                    <button type="button" class="btn btn-sm btn-outline-primary" onclick="addRow('edu-container')">+ Add</button>
                </div>

                <div id="edu-container">

                    <div class="dynamic-row">
                        <input class="form-control mb-2 edu-inst" placeholder="Institution">
                        <input class="form-control edu-deg" placeholder="Degree">
                    </div>

                </div>

            </div>


            <!-- Experience -->

            <div class="mb-4">

                <div class="d-flex justify-content-between mb-2">
                    <label>Experience</label>
                    <button type="button" class="btn btn-sm btn-outline-primary" onclick="addRow('exp-container')">+ Add</button>
                </div>

                <div id="exp-container">

                    <div class="dynamic-row">
                        <input class="form-control mb-2 exp-comp" placeholder="Company">
                        <input class="form-control exp-role" placeholder="Role">
                    </div>

                </div>

            </div>


            <!-- Projects -->

            <div class="mb-4">

                <div class="d-flex justify-content-between mb-2">
                    <label>Projects</label>
                    <button type="button" class="btn btn-sm btn-outline-primary" onclick="addRow('proj-container')">+ Add</button>
                </div>

                <div id="proj-container">

                    <div class="dynamic-row">
                        <input class="form-control mb-2 proj-title" placeholder="Project Title">
                        <input class="form-control mb-2 proj-tech" placeholder="Technologies">
                        <input class="form-control mb-2 proj-link" placeholder="Project Link">
                        <textarea class="form-control proj-desc" rows="3" placeholder="Project Description"></textarea>
                    </div>

                </div>

            </div>


            <!-- Certifications -->

            <div class="mb-4">

                <div class="d-flex justify-content-between mb-2">
                    <label>Certifications</label>
                    <button type="button" class="btn btn-sm btn-outline-primary" onclick="addRow('cert-container')">+ Add</button>
                </div>

                <div id="cert-container">

                    <div class="dynamic-row">
                        <input class="form-control mb-2 cert-name" placeholder="Certification Name">
                        <input class="form-control mb-2 cert-company" placeholder="Company">
                        <input class="form-control cert-tech" placeholder="Technologies">
                    </div>

                </div>

            </div>


            <!-- Skills -->

            <div class="mb-4">
                <label>Skills *</label>
                <input id="skillsInput" class="form-control" placeholder="Java, Spring Boot, React" required>
            </div>

            <button class="btn btn-primary w-100 py-2">Save Resume</button>

        </form>

    </div>

</main>


<script>

    function addRow(containerId){

        const container=document.getElementById(containerId)

        const id=Date.now()

        let html=""

        if(containerId==="edu-container"){
            html=`<div class="dynamic-row" id="${id}">
<div class="btn-remove" onclick="removeRow('${id}')">✕</div>
<input class="form-control mb-2 edu-inst" placeholder="Institution">
<input class="form-control edu-deg" placeholder="Degree">
</div>`
        }

        if(containerId==="exp-container"){
            html=`<div class="dynamic-row" id="${id}">
<div class="btn-remove" onclick="removeRow('${id}')">✕</div>
<input class="form-control mb-2 exp-comp" placeholder="Company">
<input class="form-control exp-role" placeholder="Role">
</div>`
        }

        if(containerId==="proj-container"){
            html=`<div class="dynamic-row" id="${id}">
<div class="btn-remove" onclick="removeRow('${id}')">✕</div>
<input class="form-control mb-2 proj-title" placeholder="Project Title">
<input class="form-control mb-2 proj-tech" placeholder="Technologies">
<input class="form-control mb-2 proj-link" placeholder="Project Link">
<textarea class="form-control proj-desc" rows="3" placeholder="Project Description"></textarea>
</div>`
        }

        if(containerId==="cert-container"){
            html=`<div class="dynamic-row" id="${id}">
<div class="btn-remove" onclick="removeRow('${id}')">✕</div>
<input class="form-control mb-2 cert-name" placeholder="Certification Name">
<input class="form-control mb-2 cert-company" placeholder="Company">
<input class="form-control cert-tech" placeholder="Technologies">
</div>`
        }

        container.insertAdjacentHTML("beforeend",html)

    }

    function removeRow(id){
        document.getElementById(id).remove()
    }


    /* SAVE RESUME */

    document.getElementById("resumeForm").onsubmit=async(e)=>{

        e.preventDefault()

        const userId=document.getElementById("userId").value
        const objective=document.getElementById("objective").value.trim()
        const skills=document.getElementById("skillsInput").value.trim()

        if(objective==="" || skills===""){
            alert("Please enter all required fields")
            return
        }

        const resumeData={

            objective:objective,

            educations:Array.from(document.querySelectorAll("#edu-container .dynamic-row")).map(r=>({
                institution:r.querySelector(".edu-inst").value,
                degree:r.querySelector(".edu-deg").value
            })),

            experiences:Array.from(document.querySelectorAll("#exp-container .dynamic-row")).map(r=>({
                companyName:r.querySelector(".exp-comp").value,
                role:r.querySelector(".exp-role").value
            })),

            projects:Array.from(document.querySelectorAll("#proj-container .dynamic-row")).map(r=>({
                projectTitle:r.querySelector(".proj-title").value,
                technologies:r.querySelector(".proj-tech").value,
                projectLink:r.querySelector(".proj-link").value,
                description:r.querySelector(".proj-desc").value
            })),

            certifications:Array.from(document.querySelectorAll("#cert-container .dynamic-row")).map(r=>({
                certificationName:r.querySelector(".cert-name").value,
                company:r.querySelector(".cert-company").value,
                technologies:r.querySelector(".cert-tech").value
            })),

            skills:skills.split(",").map(s=>s.trim())

        }

        try{

            const response=await fetch(`/api/jobseeker/resume/save/${userId}`,{
                method:"POST",
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify(resumeData)
            })

            const result=await response.json()

            if(response.ok){

                alert("Resume Saved Successfully")

                window.location.href="/jobseeker/resume/view"

            }else{

                alert(result.error || "Error saving resume")

            }

        }catch(err){

            alert("Server error while saving resume")

        }

    }

</script>

</body>
</html>
