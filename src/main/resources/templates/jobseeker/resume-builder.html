<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Resume Builder | RevHire</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        :root{
        --primary:#2563eb;
        --sidebar:#0f172a;
        --bg:#f8fafc;
        --border:#e2e8f0;
        }

        body{
        background:var(--bg);
        font-family:'Plus Jakarta Sans',sans-serif;
        display:flex;
        }

        .sidebar{
        width:250px;
        height:100vh;
        background:var(--sidebar);
        position:fixed;
        padding:1.5rem 1rem;
        display:flex;
        flex-direction:column;
        }

        .logo{
        font-size:1.4rem;
        font-weight:800;
        color:white;
        display:flex;
        gap:10px;
        align-items:center;
        margin-bottom:25px;
        text-decoration:none;
        }

        .nav-link{
        color:#94a3b8;
        padding:10px 14px;
        border-radius:10px;
        display:flex;
        gap:10px;
        align-items:center;
        margin-bottom:5px;
        transition:.25s;
        text-decoration:none;
        }

        .nav-link:hover,
        .nav-link.active{
        background:var(--primary);
        color:white;
        }

        .main{
        margin-left:250px;
        width:100%;
        padding:40px;
        }

        .card-box{
        background:white;
        padding:25px;
        border-radius:20px;
        border:1px solid var(--border);
        margin-bottom:25px;
        }

        .dynamic-row{
        background:#f1f5f9;
        border-radius:12px;
        padding:15px;
        margin-bottom:15px;
        position:relative;
        }

        .btn-remove{
        position:absolute;
        top:10px;
        right:10px;
        color:#ef4444;
        background:white;
        border-radius:50%;
        width:24px;
        height:24px;
        display:flex;
        align-items:center;
        justify-content:center;
        cursor:pointer;
        border:1px solid #fee2e2;
        }

    </style>

</head>

<body>

<nav class="sidebar">

    <a th:href="@{'/jobseeker/dashboard/' + ${session.userId}}" class="logo">
        <i class="bi bi-rocket-takeoff-fill text-primary"></i>
        <span>RevHire</span>
    </a>

    <div class="nav-menu">

        <a th:href="@{'/jobseeker/dashboard/' + ${session.userId}}" class="nav-link">
            <i class="bi bi-speedometer2"></i> <span>Dashboard</span>
        </a>

        <a th:href="@{/jobseeker/profile/manage}" class="nav-link">
            <i class="bi bi-pencil"></i> <span>Manage Profile</span>
        </a>

        <a th:href="@{/jobseeker/resume/builder}" class="nav-link active">
            <i class="bi bi-file-earmark-text"></i> <span>Resume Builder</span>
        </a>

        <a th:href="@{/jobseeker/resume/view}" class="nav-link">
            <i class="bi bi-eye"></i> <span>View Resume</span>
        </a>

        <a th:href="@{/jobseeker/resume/upload}" class="nav-link">
            <i class="bi bi-upload"></i> <span>Upload Resume</span>
        </a>

        <a th:href="@{/jobseeker/jobs/search}" class="nav-link">
            <i class="bi bi-search"></i> <span>Search Jobs</span>
        </a>

        <a th:href="@{/jobseeker/applications}" class="nav-link">
            <i class="bi bi-briefcase"></i> <span>Applications</span>
        </a>

        <a th:href="@{/jobseeker/jobs/saved}" class="nav-link">
            <i class="bi bi-heart"></i> <span>Saved Jobs</span>
        </a>

        <a th:href="@{/notifications/notification}" class="nav-link">
            <i class="bi bi-bell"></i> <span>Notifications</span>
        </a>

        <a th:href="@{/auth/reset-password}" class="nav-link">
            <i class="bi bi-key"></i> <span>Reset Password</span>
        </a>

    </div>

    <div class="mt-auto">
        <a th:href="@{/}" class="nav-link text-danger">
            <i class="bi bi-box-arrow-left"></i> <span>Logout</span>
        </a>
    </div>

</nav>

<div class="main">

    <h2 class="fw-bold mb-4">Professional Resume Builder</h2>

    <form id="resumeForm">

        <input type="hidden" id="userId" th:value="${session.userId}">

        <div class="card-box">
            <label class="fw-bold mb-2">Career Objective</label>
            <textarea id="objective" class="form-control" rows="3"></textarea>
        </div>

        <!-- Education -->

        <div class="card-box">

            <div class="d-flex justify-content-between mb-2">

                <h5>Education</h5>

                <div>

                    <button type="button" class="btn btn-outline-secondary btn-sm me-2"
                            onclick="enableEdit('edu-container')">
                        <i class="bi bi-pencil"></i> Edit
                    </button>

                    <button type="button" class="btn btn-outline-primary btn-sm"
                            onclick="addRow('edu-container')">
                        + Add
                    </button>

                </div>

            </div>

            <div id="edu-container">

                <div class="dynamic-row">
                    <input type="text" class="form-control mb-2 edu-inst" placeholder="Institution" disabled>
                    <input type="text" class="form-control edu-deg" placeholder="Degree" disabled>
                </div>

            </div>

        </div>

        <!-- Experience -->

        <div class="card-box">

            <div class="d-flex justify-content-between mb-2">

                <h5>Experience</h5>

                <div>

                    <button type="button" class="btn btn-outline-secondary btn-sm me-2"
                            onclick="enableEdit('exp-container')">
                        <i class="bi bi-pencil"></i> Edit
                    </button>

                    <button type="button" class="btn btn-outline-primary btn-sm"
                            onclick="addRow('exp-container')">
                        + Add
                    </button>

                </div>

            </div>

            <div id="exp-container">

                <div class="dynamic-row">
                    <input type="text" class="form-control mb-2 exp-comp" placeholder="Company" disabled>
                    <input type="text" class="form-control exp-role" placeholder="Role" disabled>
                </div>

            </div>

        </div>

        <!-- Projects -->

        <div class="card-box">

            <div class="d-flex justify-content-between mb-2">

                <h5>Projects</h5>

                <div>

                    <button type="button" class="btn btn-outline-secondary btn-sm me-2"
                            onclick="enableEdit('project-container')">
                        <i class="bi bi-pencil"></i> Edit
                    </button>

                    <button type="button" class="btn btn-outline-primary btn-sm"
                            onclick="addRow('project-container')">
                        + Add
                    </button>

                </div>

            </div>

            <div id="project-container">

                <div class="dynamic-row">
                    <input type="text" class="form-control mb-2 proj-title" placeholder="Project Title" disabled>
                    <input type="text" class="form-control proj-desc" placeholder="Description" disabled>
                </div>

            </div>

        </div>

        <!-- Certifications -->

        <div class="card-box">

            <div class="d-flex justify-content-between mb-2">

                <h5>Certifications</h5>

                <div>

                    <button type="button" class="btn btn-outline-secondary btn-sm me-2"
                            onclick="enableEdit('cert-container')">
                        <i class="bi bi-pencil"></i> Edit
                    </button>

                    <button type="button" class="btn btn-outline-primary btn-sm"
                            onclick="addRow('cert-container')">
                        + Add
                    </button>

                </div>

            </div>

            <div id="cert-container">

                <div class="dynamic-row">
                    <input type="text" class="form-control mb-2 cert-name" placeholder="Certification" disabled>
                    <input type="text" class="form-control cert-org" placeholder="Organization" disabled>
                </div>

            </div>

        </div>

        <button type="submit" class="btn btn-primary w-100 py-3">
            Save Resume
        </button>

    </form>

</div>

<script>

    function enableEdit(containerId){
    document.querySelectorAll("#"+containerId+" input").forEach(i=>i.removeAttribute("disabled"));
    }

    function addRow(containerId){

    const container=document.getElementById(containerId);
    const id=Date.now();
    let html="";

    if(containerId==="edu-container"){
    html=`<div class="dynamic-row" id="row-${id}">
    <div class="btn-remove" onclick="removeRow('row-${id}')">x</div>
    <input type="text" class="form-control mb-2 edu-inst" placeholder="Institution">
    <input type="text" class="form-control edu-deg" placeholder="Degree">
    </div>`;
    }

    else if(containerId==="exp-container"){
    html=`<div class="dynamic-row" id="row-${id}">
    <div class="btn-remove" onclick="removeRow('row-${id}')">x</div>
    <input type="text" class="form-control mb-2 exp-comp" placeholder="Company">
    <input type="text" class="form-control exp-role" placeholder="Role">
    </div>`;
    }

    else if(containerId==="project-container"){
    html=`<div class="dynamic-row" id="row-${id}">
    <div class="btn-remove" onclick="removeRow('row-${id}')">x</div>
    <input type="text" class="form-control mb-2 proj-title" placeholder="Project Title">
    <input type="text" class="form-control proj-desc" placeholder="Description">
    </div>`;
    }

    else if(containerId==="cert-container"){
    html=`<div class="dynamic-row" id="row-${id}">
    <div class="btn-remove" onclick="removeRow('row-${id}')">x</div>
    <input type="text" class="form-control mb-2 cert-name" placeholder="Certification">
    <input type="text" class="form-control cert-org" placeholder="Organization">
    </div>`;
    }

    container.insertAdjacentHTML("beforeend",html);

    }

    function removeRow(id){
    document.getElementById(id).remove();
    }

    /* ENABLE EMPTY FIELDS AUTOMATICALLY */

    window.addEventListener("DOMContentLoaded",()=>{

    document.querySelectorAll(".dynamic-row input").forEach(input=>{

    if(input.value.trim()===""){
    input.removeAttribute("disabled");
    }

    });

    });

    document.getElementById("resumeForm").onsubmit=async(e)=>{

    e.preventDefault();

    const userId=document.getElementById("userId").value;

    const resumeData={

    objective:document.getElementById("objective").value,

    educations:[
    ...Array.from(document.querySelectorAll("#edu-container .dynamic-row")).map(r=>({
    institution:r.querySelector(".edu-inst").value,
    degree:r.querySelector(".edu-deg").value
    }))
    ],

    experiences:[
    ...Array.from(document.querySelectorAll("#exp-container .dynamic-row")).map(r=>({
    companyName:r.querySelector(".exp-comp").value,
    role:r.querySelector(".exp-role").value
    }))
    ]

    };

    await fetch(`/api/jobseeker/resume/save/${userId}`,{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(resumeData)
    });

    alert("Resume Saved Successfully");

    }

</script>

</body>
</html>
