<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Resume Builder | RevHire</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        :root{
        --primary:#2563eb;
        --sidebar-bg:#0f172a;
        --bg-subtle:#f8fafc;
        --border:#e2e8f0;
        --text-main:#0f172a;
        }

        *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Plus Jakarta Sans',sans-serif;
        }

        body{
        background:var(--bg-subtle);
        color:var(--text-main);
        display:flex;
        min-height:100vh;
        }

        /* Sidebar */

        .sidebar{
        width:250px;
        height:100vh;
        background:var(--sidebar-bg);
        color:white;
        position:fixed;
        padding:1.5rem 1rem;
        display:flex;
        flex-direction:column;
        }

        .logo{
        font-size:1.5rem;
        font-weight:800;
        padding:0 1rem 1.5rem;
        display:flex;
        align-items:center;
        gap:10px;
        color:white;
        text-decoration:none;
        }

        .nav-menu{
        list-style:none;
        padding:0;
        flex-grow:1;
        }

        .nav-link{
        color:#94a3b8;
        text-decoration:none;
        padding:0.7rem 1rem;
        border-radius:10px;
        display:flex;
        align-items:center;
        gap:12px;
        font-weight:500;
        transition:0.3s;
        margin-bottom:2px;
        }

        .nav-link:hover,
        .nav-link.active{
        background:var(--primary);
        color:white;
        }

        .main-content{
        margin-left:250px;
        flex:1;
        padding:2.5rem;
        }

        .form-card{
        background:white;
        border-radius:20px;
        padding:30px;
        border:1px solid var(--border);
        box-shadow:0 4px 6px rgba(0,0,0,0.1);
        }

        .dynamic-row{
        background:#f1f5f9;
        border-radius:12px;
        padding:15px;
        margin-bottom:15px;
        position:relative;
        }

        .btn-remove{
        position:absolute;
        top:10px;
        right:10px;
        color:#ef4444;
        background:white;
        border-radius:50%;
        width:24px;
        height:24px;
        display:flex;
        align-items:center;
        justify-content:center;
        cursor:pointer;
        border:1px solid #fee2e2;
        }

        .edit-highlight{
        border:2px solid #2563eb !important;
        background:#eff6ff;
        }

    </style>

</head>

<body>

<!-- Sidebar -->

<nav class="sidebar">

    <a th:href="@{'/jobseeker/dashboard/' + ${session.userId}}" class="logo">
        <i class="bi bi-rocket-takeoff-fill text-primary"></i>
        <span>RevHire</span>
    </a>

    <div class="nav-menu">

        <a th:href="@{'/jobseeker/dashboard/' + ${session.userId}}" class="nav-link">
            <i class="bi bi-speedometer2"></i>
            <span>Dashboard</span>
        </a>

        <a th:href="@{/jobseeker/profile/manage}" class="nav-link">
            <i class="bi bi-pencil"></i>
            <span>Manage Profile</span>
        </a>

        <a th:href="@{/jobseeker/resume/builder}" class="nav-link active">
            <i class="bi bi-file-earmark-text"></i>
            <span>Resume Builder</span>
        </a>

        <a th:href="@{/jobseeker/resume/view}" class="nav-link">
            <i class="bi bi-eye"></i>
            <span>View Resume</span>
        </a>

        <a th:href="@{/jobseeker/resume/upload}" class="nav-link">
            <i class="bi bi-upload"></i>
            <span>Upload Resume</span>
        </a>

    </div>

</nav>

<main class="main-content">

    <div class="container-fluid" style="max-width:900px;">

        <h2 class="fw-bold mb-4">Professional Resume Builder</h2>

        <form class="form-card">

            <!-- Career Objective -->

            <div class="mb-4">

                <div class="d-flex justify-content-between align-items-center mb-2">

                    <label class="form-label fw-bold text-muted small text-uppercase">
                        Career Objective
                    </label>

                    <button type="button"
                            class="btn btn-outline-secondary btn-sm"
                            onclick="editField('objective')"> <i class="bi bi-pencil"></i> Edit </button>

                </div>

                <textarea id="objective" class="form-control" rows="3" disabled></textarea>

            </div>

            <!-- Education -->

            <div class="mb-4">

                <div class="d-flex justify-content-between align-items-center mb-3">

                    <label class="form-label fw-bold text-muted small text-uppercase">Education</label>

                    <div>

                        <button type="button" class="btn btn-outline-secondary btn-sm me-2"
                                onclick="editSection('edu-container')"> <i class="bi bi-pencil"></i> Edit </button>

                        <button type="button" class="btn btn-outline-primary btn-sm"
                                onclick="addRow('edu-container')">

                            * Add

                        </button>

                    </div>

                </div>

                <div id="edu-container">

                    <div class="dynamic-row">

                        <input type="text" class="form-control mb-2" placeholder="Institution" disabled>

                        <input type="text" class="form-control" placeholder="Degree" disabled>

                    </div>

                </div>

            </div>

            <!-- Experience -->

            <div class="mb-4">

                <div class="d-flex justify-content-between align-items-center mb-3">

                    <label class="form-label fw-bold text-muted small text-uppercase">Experience</label>

                    <div>

                        <button type="button" class="btn btn-outline-secondary btn-sm me-2"
                                onclick="editSection('exp-container')"> <i class="bi bi-pencil"></i> Edit </button>

                        <button type="button" class="btn btn-outline-primary btn-sm"
                                onclick="addRow('exp-container')">

                            * Add

                        </button>

                    </div>

                </div>

                <div id="exp-container">

                    <div class="dynamic-row">

                        <input type="text" class="form-control mb-2" placeholder="Company" disabled>

                        <input type="text" class="form-control" placeholder="Role" disabled>

                    </div>

                </div>

            </div>

            <!-- Skills -->

            <div class="mb-4">

                <div class="d-flex justify-content-between align-items-center mb-3">

                    <label class="form-label fw-bold text-muted small text-uppercase">Skills</label>

                    <div>

                        <button type="button" class="btn btn-outline-secondary btn-sm me-2"
                                onclick="editSection('skills-container')"> <i class="bi bi-pencil"></i> Edit </button>

                        <button type="button" class="btn btn-outline-primary btn-sm"
                                onclick="addRow('skills-container')">

                            * Add

                        </button>

                    </div>

                </div>

                <div id="skills-container">

                    <div class="dynamic-row">

                        <input type="text" class="form-control" placeholder="Skill" disabled>

                    </div>

                </div>

            </div>

            <!-- Projects -->

            <div class="mb-4">

                <div class="d-flex justify-content-between align-items-center mb-2">

                    <label class="form-label fw-bold text-muted small text-uppercase">
                        Projects
                    </label>

                    <button type="button"
                            class="btn btn-outline-secondary btn-sm"
                            onclick="editField('projects')"> <i class="bi bi-pencil"></i> Edit </button>

                </div>

                <textarea id="projects" class="form-control" rows="3" disabled></textarea>

            </div>

            <!-- Certifications -->

            <div class="mb-4">

                <div class="d-flex justify-content-between align-items-center mb-3">

                    <label class="form-label fw-bold text-muted small text-uppercase">
                        Certifications
                    </label>

                    <div>

                        <button type="button" class="btn btn-outline-secondary btn-sm me-2"
                                onclick="editSection('cert-container')"> <i class="bi bi-pencil"></i> Edit </button>

                        <button type="button" class="btn btn-outline-primary btn-sm"
                                onclick="addRow('cert-container')">

                            * Add

                        </button>

                    </div>

                </div>

                <div id="cert-container">

                    <div class="dynamic-row">

                        <input type="text" class="form-control" placeholder="Certification" disabled>

                    </div>

                </div>

            </div>

            <button class="btn btn-primary w-100 fw-bold py-3">
                Save Resume
            </button>

        </form>

    </div>

</main>

<script>

    function editField(id){

    const field=document.getElementById(id)

    field.disabled=false
    field.classList.add("edit-highlight")
    field.focus()

    }

    function editSection(containerId){

    const container=document.getElementById(containerId)

    const inputs=container.querySelectorAll("input")

    inputs.forEach(input=>{
    input.disabled=false
    input.classList.add("edit-highlight")
    })

    }

    function addRow(containerId){

    const container=document.getElementById(containerId)

    const rowId=Date.now()

    let html=""

    if(containerId==="edu-container"){

    html=`
    <div class="dynamic-row" id="row-${rowId}">
    <div class="btn-remove" onclick="removeRow('row-${rowId}')">x</div>

    <input type="text"
    class="form-control mb-2 edit-highlight"
    placeholder="Institution">

    <input type="text"
    class="form-control edit-highlight"
    placeholder="Degree">

    </div>
    `

    }

    else if(containerId==="exp-container"){

    html=`
    <div class="dynamic-row" id="row-${rowId}">
    <div class="btn-remove" onclick="removeRow('row-${rowId}')">x</div>

    <input type="text"
    class="form-control mb-2 edit-highlight"
    placeholder="Company">

    <input type="text"
    class="form-control edit-highlight"
    placeholder="Role">

    </div>
    `

    }

    else if(containerId==="skills-container"){

    html=`
    <div class="dynamic-row" id="row-${rowId}">
    <div class="btn-remove" onclick="removeRow('row-${rowId}')">x</div>

    <input type="text"
    class="form-control edit-highlight"
    placeholder="Skill">

    </div>
    `

    }

    else if(containerId==="cert-container"){

    html=`
    <div class="dynamic-row" id="row-${rowId}">
    <div class="btn-remove" onclick="removeRow('row-${rowId}')">x</div>

    <input type="text"
    class="form-control edit-highlight"
    placeholder="Certification">

    </div>
    `

    }

    container.insertAdjacentHTML("beforeend",html)

    }

    function removeRow(id){
    document.getElementById(id).remove()
    }

</script>

</body>
</html>
