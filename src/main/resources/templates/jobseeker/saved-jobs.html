<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Saved Jobs | RevHire</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root{
            --primary:#2563eb;
            --sidebar-bg:#0f172a;
            --bg-subtle:#f8fafc;
            --text-main:#0f172a;
            --text-muted:#64748b;
            --border:#e2e8f0;
            --card-shadow:0 10px 15px -3px rgba(0,0,0,0.05);
        }

        *{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif;}
        body{background:var(--bg-subtle);color:var(--text-main);display:flex;min-height:100vh;}

        .sidebar{
            width:250px;height:100vh;background:var(--sidebar-bg);color:white;
            position:fixed;padding:1.5rem 1rem;display:flex;flex-direction:column;
        }

        .logo{
            font-size:1.5rem;font-weight:800;padding:0 1rem 1.5rem;
            display:flex;align-items:center;gap:10px;color:white;text-decoration:none;
        }

        .nav-menu{list-style:none;padding:0;flex-grow:1;overflow-y:auto;}

        .nav-link{
            color:#94a3b8;text-decoration:none;padding:.7rem 1rem;border-radius:10px;
            display:flex;align-items:center;gap:12px;font-weight:500;transition:.3s;margin-bottom:2px;
        }

        .nav-link:hover, .nav-link.active{
            background:var(--primary)!important;
            color:white!important;
        }

        .main-content{
            margin-left:250px;flex:1;padding:2.5rem;width:calc(100% - 250px);
        }

        .job-card{
            background:white;padding:1.8rem;border-radius:20px;
            border:1px solid var(--border);box-shadow:var(--card-shadow);
            margin-bottom:1.25rem;transition:.3s;
        }

        .job-card:hover{
            transform:translateY(-5px);
            border-color:var(--primary);
        }

        .company-name{
            color:var(--primary);
            font-weight:700;
            font-size:.85rem;
            text-transform:uppercase;
        }

        .job-title{
            font-weight:800;
            font-size:1.3rem;
            margin:.4rem 0;
        }

        .job-meta{
            font-size:.9rem;
            color:var(--text-muted);
            display:flex;
            gap:20px;
        }

        .job-meta i{
            color:var(--primary);
            margin-right:5px;
        }

        .applied-badge {
            background-color: #f1f5f9;
            color: #64748b;
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>

<body>

<nav class="sidebar">
    <a th:href="@{'/jobseeker/dashboard/' + ${session.userId}}" class="logo">
        <i class="bi bi-rocket-takeoff-fill text-primary"></i>
        <span>RevHire</span>
    </a>

    <div class="nav-menu">
        <a th:href="@{'/jobseeker/dashboard/' + ${session.userId}}" class="nav-link">
            <i class="bi bi-speedometer2"></i><span>Dashboard</span>
        </a>
        <a th:href="@{/jobseeker/profile/manage}" class="nav-link">
            <i class="bi bi-pencil"></i><span>Manage Profile</span>
        </a>
        <a th:href="@{/jobseeker/resume/builder}" class="nav-link">
            <i class="bi bi-file-earmark-text"></i><span>Resume Builder</span>
        </a>
        <a th:href="@{/jobseeker/resume/view}" class="nav-link">
            <i class="bi bi-eye"></i><span>View Resume</span>
        </a>
        <a th:href="@{/jobseeker/resume/upload}" class="nav-link">
            <i class="bi bi-upload"></i><span>Upload Resume</span>
        </a>
        <a th:href="@{/jobseeker/jobs/search}" class="nav-link">
            <i class="bi bi-search"></i><span>Search Jobs</span>
        </a>
        <a th:href="@{/jobseeker/applications}" class="nav-link">
            <i class="bi bi-briefcase"></i><span>Applications</span>
        </a>
        <a th:href="@{/jobseeker/jobs/saved}" class="nav-link active">
            <i class="bi bi-heart"></i><span>Saved Jobs</span>
        </a>
        <a th:href="@{/notifications/notification}" class="nav-link">
            <i class="bi bi-bell"></i><span>Notifications</span>
        </a>
        <a th:href="@{/auth/reset-password}" class="nav-link">
            <i class="bi bi-key"></i><span>Reset Password</span>
        </a>
    </div>

    <div class="mt-auto">
        <a th:href="@{/}" class="nav-link text-danger">
            <i class="bi bi-box-arrow-left"></i><span>Logout</span>
        </a>
    </div>
</nav>

<main class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold mb-0">Saved Jobs</h3>
        <span class="badge bg-primary rounded-pill px-3 py-2" th:text="${#lists.size(savedJobs)} + ' Jobs'"></span>
    </div>

    <input type="hidden" id="sessionUserId" th:value="${session.userId}">

    <div id="jobListings">
        <div th:each="job : ${savedJobs}" class="job-card"
             th:attr="data-jobid=${job.jobId}, data-title=${job.title}">

            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <span class="company-name" th:text="${job.companyName}"></span>
                    <h5 class="job-title" th:text="${job.title}"></h5>
                </div>
                <div class="d-flex gap-2 align-items-center">
                    <button th:id="'applyBtn-' + ${job.jobId}"
                            th:onclick="'handleApply(' + ${job.jobId} + ')'"
                            class="btn btn-primary rounded-pill px-4">
                        Apply Now
                    </button>

                    <button class="btn btn-outline-danger btn-sm rounded-circle shadow-sm"
                            th:onclick="'removeSaved(' + ${job.jobId} + ')'"
                            style="width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;"
                            title="Unsave Job">
                        <i class="bi bi-heart-fill"></i>
                    </button>
                </div>
            </div>

            <div class="job-meta mt-2">
                <span><i class="bi bi-geo-alt"></i><span th:text="${job.location}"></span></span>
                <span><i class="bi bi-currency-dollar"></i>
                <span th:text="${job.salaryMin + ' - ' + job.salaryMax}"></span></span>
                <span><i class="bi bi-clock"></i>
                <span th:text="${job.jobType}"></span></span>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(savedJobs)}" class="text-center py-5 text-muted bg-white border rounded-4">
            <i class="bi bi-heart" style="font-size:3rem"></i>
            <p class="mt-2 fw-bold">No saved jobs found.</p>
            <p class="small text-muted mb-4">Start exploring opportunities and save the ones you like!</p>
            <a href="/jobseeker/jobs/search" class="btn btn-primary px-4 rounded-pill">Search Jobs</a>
        </div>
    </div>
</main>

<script>
    /**
     * Replaces the Apply button with a checked "Applied" badge
     */
    function updateToAppliedState(jobId) {
        const btn = document.getElementById(`applyBtn-${jobId}`);
        if (btn) {
            const appliedLabel = document.createElement("span");
            appliedLabel.className = "applied-badge";
            appliedLabel.innerHTML = `<i class="bi bi-check-circle-fill"></i> Applied`;
            btn.parentNode.replaceChild(appliedLabel, btn);
        }
    }

    /**
     * Checks existing applications on load to show "Applied" badges
     */
    document.addEventListener("DOMContentLoaded", async () => {
        const userId = document.getElementById("sessionUserId").value;
        if(!userId) return;

        try {
            const res = await fetch(`/applications/seeker/${userId}`);
            if (res.ok) {
                const appliedList = await res.json();
                const jobCards = document.querySelectorAll(".job-card");

                appliedList.forEach(app => {
                    jobCards.forEach(card => {
                        if (card.dataset.jobid == app.jobId || card.dataset.title === app.jobTitle) {
                            updateToAppliedState(card.dataset.jobid);
                        }
                    });
                });
            }
        } catch (e) { console.log("Applied sync failed."); }
    });

    /**
     * Handles Job Application Submission
     */
    async function handleApply(jobId) {
        const userId = document.getElementById("sessionUserId").value;
        if (!userId) {
            Swal.fire("Error", "Session expired. Please login again.", "error");
            return;
        }

        Swal.fire({ title: 'Submitting Application...', didOpen: () => { Swal.showLoading() } });

        try {
            const params = new URLSearchParams();
            params.append('jobId', jobId);
            params.append('seekerId', userId);
            params.append('resumeId', 1); // Default resume
            params.append('coverLetter', "Applied from Saved Jobs list.");

            const res = await fetch('/applications/submit-application', {
                method: "POST",
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params
            });

            if (res.ok) {
                Swal.fire({ icon: 'success', title: 'Application Sent!', timer: 1500, showConfirmButton: false });
                updateToAppliedState(jobId);
            } else {
                Swal.fire("Error", "Failed to submit application.", "error");
            }
        } catch (err) {
            Swal.fire("Error", "Network error.", "error");
        }
    }

    /**
     * REMOVE SAVED JOB FUNCTION
     * Syncs with @DeleteMapping("/api/jobseeker/favorites/{seekerId}/{jobId}")
     */
    async function removeSaved(jobId) {
        const seekerId = document.getElementById("sessionUserId").value;
        if (!seekerId) return;

        const result = await Swal.fire({
            title: 'Remove from Saved?',
            text: "You can save this job again from the search page.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            cancelButtonColor: '#64748b',
            confirmButtonText: 'Yes, remove it!',
            cancelButtonText: 'Cancel'
        });

        if (result.isConfirmed) {
            try {
                // Fetch matches the new URL mapping in JobSeekerController
                const res = await fetch(`/api/jobseeker/favorites/${seekerId}/${jobId}`, {
                    method: 'DELETE'
                });

                if (res.ok) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Removed!',
                        timer: 1000,
                        showConfirmButton: false
                    });

                    // Refresh the page to update the UI and job count
                    setTimeout(() => window.location.reload(), 1000);
                } else {
                    const data = await res.json();
                    Swal.fire("Error", data.error || "Could not remove job.", "error");
                }
            } catch (err) {
                Swal.fire("Error", "Server error. Please try again later.", "error");
            }
        }
    }
</script>
</body>
</html>
