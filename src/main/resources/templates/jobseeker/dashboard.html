<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Job Seeker Dashboard | RevHire</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --primary: #2563eb; --sidebar-bg: #0f172a; --bg-subtle: #f8fafc;
            --border: #e2e8f0; --text-main: #0f172a; --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-subtle); color: var(--text-main); display: flex; min-height: 100vh; }

        /* Sidebar - Standardized */
        .sidebar { width: 250px; height: 100vh; background: var(--sidebar-bg); color: white; position: fixed; padding: 1.5rem 1rem; display: flex; flex-direction: column; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: 800; padding: 0 1rem 1.5rem; display: flex; align-items: center; gap: 10px; color: white; text-decoration: none; }
        .nav-link { color: #94a3b8; text-decoration: none; padding: 0.8rem 1rem; border-radius: 12px; display: flex; align-items: center; gap: 12px; font-weight: 500; transition: 0.2s; margin-bottom: 4px; }
        .nav-link:hover, .nav-link.active { background: var(--primary); color: white; }

        /* Main Content */
        .main-content { margin-left: 250px; flex: 1; padding: 2.5rem; }
        .dashboard-container { max-width: 1100px; margin: 0 auto; }

        /* Modern Card Component */
        .info-card {
            background: white; border-radius: 24px; border: 1px solid var(--border);
            padding: 2rem; box-shadow: var(--card-shadow); height: 100%;
        }

        .stat-label { font-size: 0.8rem; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 0.5rem; }
        .stat-value { font-size: 1.8rem; font-weight: 800; color: var(--text-main); }
        .text-primary { color: var(--primary) !important; }

        @media (max-width: 1024px) { .sidebar { width: 80px; } .sidebar span, .logo span { display: none; } .main-content { margin-left: 80px; } }
    </style>
</head>
<body>

<nav class="sidebar">
    <a th:href="@{/jobseeker/dashboard}" class="logo">
        <i class="bi bi-rocket-takeoff-fill text-primary"></i>
        <span>RevHire</span>
    </a>
    <div class="nav-menu">
        <a th:href="@{'/jobseeker/dashboard/' + ${session.userId}}" class="nav-link">
            <i class="bi bi-speedometer2"></i> <span>Dashboard</span>
        </a>
        <a th:href="@{/jobseeker/profile/manage}" class="nav-link">
            <i class="bi bi-pencil"></i> <span>Manage Profile</span>
        </a>
        <a th:href="@{/jobseeker/resume/builder}" class="nav-link">
            <i class="bi bi-file-earmark-text"></i> <span>Resume Builder</span>
        </a>
        <a th:href="@{/jobseeker/resume/upload}" class="nav-link">
            <i class="bi bi-upload"></i> <span>Upload Resume</span>
        </a>
        <a th:href="@{/jobseeker/jobs/search}" class="nav-link">
            <i class="bi bi-search"></i> <span>Search Jobs</span>
        </a>
        <a th:href="@{/jobseeker/applications}" class="nav-link">
            <i class="bi bi-briefcase"></i> <span>Applications</span>
        </a>
        <a th:href="@{/jobseeker/jobs/saved}" class="nav-link">
            <i class="bi bi-heart"></i> <span>Saved Jobs</span>
        </a>
        <a th:href="@{/notifications/notification}" class="nav-link">
            <i class="bi bi-bell"></i> <span>Notifications</span>
        </a>
        <a th:href="@{/auth/reset-password}" class="nav-link">
            <i class="bi bi-key"></i> <span>Reset Password</span>
        </a>
    </div>
    <div class="mt-auto">
        <a th:href="@{/}" class="nav-link text-danger">
            <i class="bi bi-box-arrow-left"></i> <span>Logout</span>
        </a>
    </div>
</nav>

<main class="main-content">
    <div class="dashboard-container">
        <header class="d-flex justify-content-between align-items-center mb-5">
            <h3 class="fw-800" th:text="'Welcome Back, ' + ${session.firstName ?: 'Seeker'}">Welcome Back</h3>
        </header>

        <div class="row g-4 mb-5">
            <div class="col-md-3"><div class="info-card"><div class="stat-label">Profile</div><div class="stat-value" id="profileScore">0%</div></div></div>
            <div class="col-md-3"><div class="info-card"><div class="stat-label">Applications</div><div class="stat-value" id="totalApps">0</div></div></div>
            <div class="col-md-3"><div class="info-card"><div class="stat-label">Resume</div><div class="stat-value text-primary" id="resumeScore">0%</div></div></div>
            <div class="col-md-3"><div class="info-card"><div class="stat-label">Saved Jobs</div><div class="stat-value" id="savedJobs">0</div></div></div>
        </div>

        <div class="info-card">
            <h5 class="fw-bold mb-4">Recent Applications</h5>
            <table class="table">
                <tbody id="recentApplications"></tbody>
            </table>
        </div>
    </div>
    <input type="hidden" id="userId" th:value="${session.userId}">
</main>

<script th:src="@{/js/jobseeker.js}"></script>
<script>document.addEventListener("DOMContentLoaded", () => loadDashboard());</script>
</body>
</html>
