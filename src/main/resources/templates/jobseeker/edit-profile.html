<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile | RevHire</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --bg-subtle: #f8fafc;
            --border: #e2e8f0;
            --text-main: #0f172a;
        }

        body {
            background: var(--bg-subtle);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-main);
        }

        .form-container { max-width: 850px; margin: 40px auto; padding: 0 20px; }

        .card {
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            background: white;
        }

        .form-label {
            font-weight: 700;
            font-size: 0.8rem;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 16px;
            border: 1px solid var(--border);
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            outline: none;
        }

        .input-group-text {
            border-radius: 12px 0 0 12px;
            background: var(--bg-subtle);
            border: 1px solid var(--border);
            color: #64748b;
        }

        .btn-save {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .btn-save:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.25);
            color: white;
        }

        .readonly-box {
            background-color: #f1f5f9 !important;
            cursor: not-allowed;
            color: #94a3b8;
        }

        /* SweetAlert2 Custom Styling to match theme */
        .swal2-popup {
            font-family: 'Plus Jakarta Sans', sans-serif !important;
            border-radius: 24px !important;
            padding: 2rem !important;
        }
        .swal2-title { font-weight: 800 !important; color: var(--text-main); }
        .swal2-confirm { border-radius: 12px !important; background-color: var(--primary) !important; padding: 12px 30px !important; }
    </style>
</head>
<body>

<div class="container form-container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-800 mb-1">Edit Profile</h2>
            <p class="text-muted mb-0">Update your professional details and contact info</p>
        </div>
        <a th:href="@{/jobseeker/profile/manage}" class="btn btn-outline-secondary rounded-pill px-4 fw-600">
            <i class="bi bi-arrow-left me-2"></i> Back to Profile
        </a>
    </div>

    <input type="hidden" id="userId" th:value="${session.userId}">
    <input type="hidden" id="profileId">

    <div class="card">
        <form id="profileForm" onsubmit="handleUpdateProfile(event)">
            <div class="row g-4">
                <div class="col-md-6">
                    <label class="form-label" for="fullName">Full Name</label>
                    <input type="text" id="fullName" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label" for="jobTitle">Professional Title</label>
                    <input type="text" id="jobTitle" class="form-control" placeholder="e.g. Software Engineer">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Email Address (Locked)</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input type="email" id="email" class="form-control readonly-box" th:value="${session.userEmail}" readonly>
                    </div>
                </div>

                <div class="col-md-6">
                    <label class="form-label" for="phone">Phone Number</label>
                    <input type="text" id="phone" class="form-control" placeholder="e.g. 9876543210">
                </div>

                <div class="col-md-6">
                    <label class="form-label" for="location">Location</label>
                    <input type="text" id="location" class="form-control" placeholder="e.g. Hyderabad, India">
                </div>

                <div class="col-md-6">
                    <label class="form-label" for="education">Education</label>
                    <input type="text" id="education" class="form-control" placeholder="e.g. B.Tech in CS">
                </div>

                <div class="col-md-12">
                    <label class="form-label" for="skills">Skills (Comma Separated)</label>
                    <input type="text" id="skills" class="form-control" placeholder="e.g. Java, SQL, Spring Boot">
                </div>

                <div class="col-md-12">
                    <label class="form-label" for="experience">Experience Summary</label>
                    <textarea id="experience" class="form-control" rows="4" placeholder="Describe your professional journey..."></textarea>
                </div>
            </div>

            <button type="submit" class="btn btn-save w-100 mt-5">
                <i class="bi bi-check-circle-fill me-2"></i> Save Changes
            </button>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const userId = document.getElementById('userId').value;
        const profileIdField = document.getElementById('profileId');

        try {
            const response = await fetch(`/api/jobseeker/profile/${userId}`);
            if (response.ok) {
                const data = await response.json();
                profileIdField.value = data.profileId;
                document.getElementById('fullName').value = data.fullName || '';
                document.getElementById('jobTitle').value = data.jobTitle || '';
                document.getElementById('phone').value = data.phone || '';
                document.getElementById('location').value = data.location || '';
                document.getElementById('education').value = data.education || '';
                document.getElementById('skills').value = data.skills || '';
                document.getElementById('experience').value = data.experience || '';
            }
        } catch (err) {
            console.error("Profile initialization failed.");
        }
    });

    async function handleUpdateProfile(event) {
        event.preventDefault();

        const userId = document.getElementById('userId').value;
        const pId = document.getElementById('profileId').value;

        const profileData = {
            fullName: document.getElementById('fullName').value,
            jobTitle: document.getElementById('jobTitle').value,
            phone: document.getElementById('phone').value,
            location: document.getElementById('location').value,
            education: document.getElementById('education').value,
            skills: document.getElementById('skills').value,
            experience: document.getElementById('experience').value
        };

        // 1. Show Professional Loading Popup
        Swal.fire({
            title: 'Updating Profile',
            text: 'Saving your professional information...',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading(); }
        });

        const url = pId ? `/api/jobseeker/profile/${pId}` : `/api/jobseeker/profile/${userId}`;
        const method = pId ? 'PUT' : 'POST';

        try {
            const response = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(profileData)
            });

            if (response.ok) {
                // 2. Show Success Toast/Popup
                Swal.fire({
                    icon: 'success',
                    title: 'Successfully Updated',
                    text: 'Your profile changes have been saved.',
                    timer: 1800,
                    showConfirmButton: false,
                    timerProgressBar: true
                }).then(() => {
                    window.location.href = '/jobseeker/profile/manage';
                });
            } else {
                // 3. Handle Business Errors
                Swal.fire({
                    icon: 'error',
                    title: 'Update Error',
                    text: 'Unable to save profile. Please check if all fields are correct.',
                    confirmButtonColor: '#2563eb'
                });
            }
        } catch (err) {
            // 4. Handle Network Errors
            Swal.fire({
                icon: 'error',
                title: 'Connection Lost',
                text: 'Network error occurred while connecting to the server.',
                confirmButtonColor: '#2563eb'
            });
        }
    }
</script>

</body>
</html>
