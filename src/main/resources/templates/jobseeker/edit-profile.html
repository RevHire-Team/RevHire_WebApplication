<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile | RevHire</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root{
        --primary:#2563eb;
        --primary-dark:#1e40af;
        --bg-subtle:#f8fafc;
        --border:#e2e8f0;
        --text-main:#0f172a;
        }

        body{
        background:var(--bg-subtle);
        font-family:'Plus Jakarta Sans',sans-serif;
        color:var(--text-main);
        }

        .form-container{
        max-width:850px;
        margin:40px auto;
        padding:0 20px;
        }

        .card{
        border:1px solid var(--border);
        border-radius:24px;
        padding:40px;
        box-shadow:0 10px 25px -5px rgba(0,0,0,0.05);
        background:white;
        }

        .form-label{
        font-weight:700;
        font-size:0.8rem;
        color:#64748b;
        text-transform:uppercase;
        margin-bottom:8px;
        letter-spacing:0.5px;
        }

        .form-control{
        border-radius:12px;
        padding:12px 16px;
        border:1px solid var(--border);
        font-weight:500;
        }

        .btn-save{
        background:var(--primary);
        color:white;
        border:none;
        padding:16px;
        border-radius:14px;
        font-weight:700;
        }

        .readonly-box{
        background-color:#f1f5f9 !important;
        cursor:not-allowed;
        color:#94a3b8;
        }
    </style>

</head>

<body>

<div class="container form-container">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>
            <h2 class="fw-800 mb-1">Edit Profile</h2>
            <p class="text-muted mb-0">Update your professional details</p>
        </div>

        <a th:href="@{/jobseeker/profile/manage}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Back
        </a>

    </div>

    <input type="hidden" id="userId" th:value="${session.userId}">
    <input type="hidden" id="profileId">

    <div class="card">

        <form id="profileForm" onsubmit="handleUpdateProfile(event)">

            <div class="row g-4">

                <div class="col-md-6">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="fullName" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Professional Title</label>
                    <input type="text" id="jobTitle" class="form-control">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" class="form-control readonly-box" th:value="${session.userEmail}" readonly>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Phone</label>
                    <input type="text" id="phone" class="form-control">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Location</label>
                    <input type="text" id="location" class="form-control">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Employment Status</label>
                    <select id="employmentStatus" class="form-control">
                        <option value="">Select</option>
                        <option value="Fresher">Fresher</option>
                        <option value="0-2 Years">0–2 Years</option>
                        <option value="3-5 Years">3–5 Years</option>
                        <option value="5-8 Years">5–8 Years</option>
                        <option value="8+ Years">8+ Years</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Education</label>
                    <input type="text" id="education" class="form-control">
                </div>

                <div class="col-md-12">
                    <label class="form-label">Skills (Comma Separated)</label>
                    <input type="text" id="skills" class="form-control">
                </div>

                <div class="col-md-12">
                    <label class="form-label">Experience Summary</label>
                    <textarea id="experience" class="form-control" rows="4"></textarea>
                </div>

            </div>

            <button type="submit" class="btn btn-save w-100 mt-4">
                <i class="bi bi-check-circle"></i> Save Changes
            </button>

        </form>

    </div>

</div>

<script>

    document.addEventListener("DOMContentLoaded", async () => {

    const userId=document.getElementById("userId").value;

    const res=await fetch(`/api/jobseeker/profile/${userId}`);

    if(res.ok){

    const data=await res.json();

    document.getElementById("profileId").value=data.profileId;
    document.getElementById("fullName").value=data.fullName||"";
    document.getElementById("jobTitle").value=data.jobTitle||"";
    document.getElementById("phone").value=data.phone||"";
    document.getElementById("location").value=data.location||"";
    document.getElementById("education").value=data.education||"";
    document.getElementById("skills").value=data.skills||"";
    document.getElementById("experience").value=data.experience||"";
    document.getElementById("employmentStatus").value=data.currentEmploymentStatus||"";

    }

    });

    async function handleUpdateProfile(event) {

event.preventDefault();

const userId = document.getElementById("userId").value;
const pId = document.getElementById("profileId").value;

const skillsInput = document.getElementById("skills").value;

const skillsArray = skillsInput
    ? skillsInput.split(",").map(s => ({
        skillName: s.trim()
    }))
    : [];

const profileData = {
fullName: document.getElementById("fullName").value,
jobTitle: document.getElementById("jobTitle").value,
phone: document.getElementById("phone").value,
location: document.getElementById("location").value,
education: document.getElementById("education").value,
skills: skillsInput,
experience: document.getElementById("experience").value,
currentEmploymentStatus: document.getElementById("employmentStatus").value
};

Swal.fire({
title: "Updating Profile",
text: "Saving your information...",
allowOutsideClick: false,
didOpen: () => Swal.showLoading()
});

try {

const profileResponse = await fetch(`/api/jobseeker/profile/${userId}`,{
method: pId ? "PUT" : "POST",
headers:{'Content-Type':'application/json'},
body: JSON.stringify(profileData)
});

if(profileResponse.ok){

/* SAVE SKILLS INTO RESUME */

await fetch(`/api/jobseeker/resume/save/${userId}`,{
method:"POST",
headers:{'Content-Type':'application/json'},
body: JSON.stringify({
skills: skillsArray
})
});

Swal.fire({
icon:"success",
title:"Profile Updated",
timer:1500,
showConfirmButton:false
}).then(()=>{
window.location.href="/jobseeker/profile/manage";
});

}else{

Swal.fire("Error","Unable to save profile","error");

}

}catch(err){

Swal.fire("Network Error","Please try again","error");

}

}
</script>

</body>
</html>
