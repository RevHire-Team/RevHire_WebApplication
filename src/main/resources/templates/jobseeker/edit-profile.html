<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile | RevHire</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root{
            --primary:#2563eb;
            --primary-dark:#1e40af;
            --bg:#f8fafc;
            --border:#e2e8f0;
        }
        body{ background:var(--bg); font-family:'Plus Jakarta Sans',sans-serif; }
        .form-container{ max-width:900px; margin:40px auto; }
        .card{ border-radius:24px; border:1px solid var(--border); padding:40px; background:white; }
        .form-label{ font-size:0.8rem; font-weight:700; text-transform:uppercase; color:#64748b; }
        .form-control,.form-select{ border-radius:12px; padding:12px; }
        .btn-save{ background:var(--primary); color:white; border:none; padding:14px; border-radius:12px; font-weight:700; }
        .btn-save:hover{ background:var(--primary-dark); }
        .skill-item, .cert-item{ margin-bottom:8px; }
    </style>
</head>
<body>
<div class="container form-container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold">Edit Profile</h2>
            <p class="text-muted">Update your professional details</p>
        </div>
        <a th:href="@{/jobseeker/profile/manage}" class="btn btn-outline-secondary rounded-pill">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>

    <input type="hidden" id="userId" th:value="${session.userId}">
    <div class="card">
        <form id="profileForm" onsubmit="handleUpdateProfile(event)">
            <div class="row g-4">
                <div class="col-md-6">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="fullName" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Professional Title</label>
                    <input type="text" id="jobTitle" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control bg-light" th:value="${session.userEmail}" readonly>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Phone</label>
                    <input type="text" id="phone" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Location</label>
                    <input type="text" id="location" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Education</label>
                    <input type="text" id="education" class="form-control" placeholder="e.g. B.Tech - JNTU">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Employment Status</label>
                    <select id="employmentStatus" class="form-select">
                        <option value="Fresher">Fresher</option>
                        <option value="0-2 Years Experience">0-2 Years Experience</option>
                        <option value="3-5 Years Experience">3-5 Years Experience</option>
                        <option value="6-10 Years Experience">6-10 Years Experience</option>
                        <option value="10+ Years Experience">10+ Years Experience</option>
                    </select>
                </div>

                <div class="col-md-12">
                    <label class="form-label">Skills</label>
                    <div id="skillsContainer"></div>
                    <div class="input-group mt-2">
                        <input type="text" id="skillInput" class="form-control" placeholder="Enter skill">
                        <button type="button" class="btn btn-primary" onclick="addSkill()">Add</button>
                    </div>
                </div>

                <div class="col-md-12">
                    <label class="form-label">Certifications</label>
                    <div id="certContainer"></div>
                    <div class="input-group mt-2">
                        <input type="text" id="certInput" class="form-control" placeholder="Enter certification">
                        <button type="button" class="btn btn-primary" onclick="addCertification()">Add</button>
                    </div>
                </div>

                <div class="col-md-12">
                    <label class="form-label">Professional Summary</label>
                    <textarea id="experience" class="form-control" rows="4" placeholder="Enter professional summary"></textarea>
                </div>
            </div>

            <button type="submit" class="btn btn-save w-100 mt-4">
                <i class="bi bi-check-circle"></i> Save Changes
            </button>
        </form>
    </div>
</div>

<script>
    let skillsList = [];
    let certList = [];

    // Render skills
    function renderSkills() {
        const container = document.getElementById("skillsContainer");
        container.innerHTML = "";
        if(skillsList.length === 0) container.innerHTML = '<span class="text-muted small">No skills added yet.</span>';
        skillsList.forEach(skill => {
            const div = document.createElement("div");
            div.className = "skill-item";
            div.innerHTML = `<input type="text" class="form-control mb-1" value="${skill}" readonly>`;
            container.appendChild(div);
        });
    }

    // Render certifications
    function renderCertifications() {
        const container = document.getElementById("certContainer");
        container.innerHTML = "";
        if(certList.length === 0) container.innerHTML = '<span class="text-muted small">No certifications added yet.</span>';
        certList.forEach(cert => {
            const div = document.createElement("div");
            div.className = "cert-item";
            div.innerHTML = `<input type="text" class="form-control mb-1" value="${cert}" readonly>`;
            container.appendChild(div);
        });
    }

    function addSkill(){
        const val = document.getElementById("skillInput").value.trim();
        if(val){ skillsList.push(val); renderSkills(); document.getElementById("skillInput").value=""; }
    }

    function addCertification(){
        const val = document.getElementById("certInput").value.trim();
        if(val){ certList.push(val); renderCertifications(); document.getElementById("certInput").value=""; }
    }

    // Load profile
    async function loadProfile(){
        const userId = document.getElementById("userId").value;
        if(!userId) return;
        try{
            const res = await fetch(`/api/jobseeker/profile/${userId}`);
            if(!res.ok) return;
            const profile = await res.json();

            document.getElementById("fullName").value = profile.fullName || "";
            document.getElementById("jobTitle").value = profile.jobTitle || "";
            document.getElementById("phone").value = profile.phone || "";
            document.getElementById("location").value = profile.location || "";
            document.getElementById("education").value = profile.education || "";
            document.getElementById("employmentStatus").value = profile.employmentStatus || "Fresher";
            document.getElementById("experience").value = profile.experience || "";

            if(profile.skills) skillsList = profile.skills.split(",").map(s=>s.trim());
            if(profile.certifications) certList = profile.certifications.split(",").map(c=>c.trim());

            renderSkills();
            renderCertifications();

        } catch(err){ console.error(err); }
    }

    // Save profile
    async function handleUpdateProfile(e){
        e.preventDefault();
        const userId = document.getElementById("userId").value;
        const data = {
            fullName: document.getElementById("fullName").value,
            jobTitle: document.getElementById("jobTitle").value,
            phone: document.getElementById("phone").value,
            location: document.getElementById("location").value,
            education: document.getElementById("education").value,
            employmentStatus: document.getElementById("employmentStatus").value,
            experience: document.getElementById("experience").value,
            skills: skillsList.join(","),
            certifications: certList.join(",")
        };
        try{
            const res = await fetch(`/api/jobseeker/profile/${userId}`, {
                method:"PUT",
                headers:{"Content-Type":"application/json"},
                body: JSON.stringify(data)
            });
            if(res.ok){
                Swal.fire({icon:"success",title:"Saved!",text:"Profile updated successfully."}).then(()=>location.href='/jobseeker/profile/manage');
            } else {
                Swal.fire({icon:"error",title:"Error",text:"Unable to save profile."});
            }
        } catch(err){
            console.error(err);
            Swal.fire({icon:"error",title:"Error",text:"Something went wrong!"});
        }
    }

    document.addEventListener("DOMContentLoaded", loadProfile);
</script>
</body>
</html>
