<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Profile | RevHire</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>

        :root{
        --primary:#2563eb;
        --primary-dark:#1e40af;
        --bg:#f8fafc;
        --border:#e2e8f0;
        }

        body{
        background:var(--bg);
        font-family:'Plus Jakarta Sans',sans-serif;
        }

        .form-container{
        max-width:850px;
        margin:40px auto;
        }

        .card{
        border-radius:24px;
        border:1px solid var(--border);
        padding:40px;
        background:white;
        }

        .form-label{
        font-size:0.8rem;
        font-weight:700;
        text-transform:uppercase;
        color:#64748b;
        }

        .form-control,.form-select{
        border-radius:12px;
        padding:12px;
        }

        .btn-save{
        background:var(--primary);
        color:white;
        border:none;
        padding:14px;
        border-radius:12px;
        font-weight:700;
        }

        .btn-save:hover{
        background:var(--primary-dark);
        }

        /* Skill badge */

        .skill-badge{
        background:#eff6ff;
        color:#2563eb;
        padding:6px 12px;
        border-radius:10px;
        font-weight:600;
        display:flex;
        align-items:center;
        gap:6px;
        }

        .skill-remove{
        cursor:pointer;
        font-weight:bold;
        color:#dc2626;
        }

    </style>

</head>

<body>

<div class="container form-container">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>
            <h2 class="fw-bold">Edit Profile</h2>
            <p class="text-muted">Update your professional details</p>
        </div>

        <a th:href="@{/jobseeker/profile/manage}" class="btn btn-outline-secondary rounded-pill">
            <i class="bi bi-arrow-left"></i> Back
        </a>

    </div>

    <input type="hidden" id="userId" th:value="${session.userId}">
    <input type="hidden" id="profileId">

    <div class="card">

        <form id="profileForm" onsubmit="handleUpdateProfile(event)">

            <div class="row g-4">

                <div class="col-md-6">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="fullName" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Professional Title</label>
                    <input type="text" id="jobTitle" class="form-control">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control bg-light" th:value="${session.userEmail}" readonly>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Phone</label>
                    <input type="text" id="phone" class="form-control">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Location</label>
                    <input type="text" id="location" class="form-control">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Education</label>
                    <input type="text" id="education" class="form-control">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Employment Status</label>

                    <select id="employmentStatus" class="form-select">

                        <option value="0">Fresher</option>
                        <option value="1">0-2 Years Experience</option>
                        <option value="3">3-5 Years Experience</option>
                        <option value="6">6-10 Years Experience</option>
                        <option value="11">10+ Years Experience</option>

                    </select>

                </div>

                <!-- SKILLS SECTION -->

                <div class="col-md-12">

                    <label class="form-label">Skills</label>

                    <div id="skillsContainer" class="d-flex flex-wrap gap-2 mb-2"></div>

                    <div class="input-group">

                        <input type="text" id="skillInput" class="form-control" placeholder="Enter skill">

                        <button type="button" class="btn btn-primary" onclick="addSkill()">Add</button>

                    </div>

                    <input type="hidden" id="skills">

                </div>

                <div class="col-md-12">

                    <label class="form-label">Experience Summary</label>

                    <textarea id="experience" class="form-control" rows="4"></textarea>

                </div>

            </div>

            <button type="submit" class="btn btn-save w-100 mt-4">

                <i class="bi bi-check-circle"></i> Save Changes

            </button>

        </form>

    </div>

</div>

<script>

    let skillsList=[];

    function renderSkills(){

    const container=document.getElementById("skillsContainer");

    container.innerHTML="";

    skillsList.forEach((skill,index)=>{

    const badge=document.createElement("span");

    badge.className="skill-badge";

    badge.innerHTML=`${skill} <span class="skill-remove" onclick="removeSkill(${index})">✕</span>`;

    container.appendChild(badge);

    });

    document.getElementById("skills").value=skillsList.join(",");

    }

    function addSkill(){

    const input=document.getElementById("skillInput");

    const skill=input.value.trim();

    if(skill && !skillsList.includes(skill)){

    skillsList.push(skill);

    renderSkills();

    }

    input.value="";

    }

    function removeSkill(index){

    skillsList.splice(index,1);

    renderSkills();

    }

    document.addEventListener("DOMContentLoaded",async()=>{

    const userId=document.getElementById("userId").value;

    const res=await fetch(`/api/jobseeker/profile/${userId}`);

    if(res.ok){

    const data=await res.json();

    document.getElementById("profileId").value=data.profileId;

    document.getElementById("fullName").value=data.fullName||"";

    document.getElementById("jobTitle").value=data.jobTitle||"";

    document.getElementById("phone").value=data.phone||"";

    document.getElementById("location").value=data.location||"";

    document.getElementById("education").value=data.education||"";

    document.getElementById("experience").value=data.experience||"";

    document.getElementById("employmentStatus").value=data.totalExperience||0;

    skillsList=data.skills ? data.skills.split(",") : [];

    renderSkills();

    }

    });

    async function handleUpdateProfile(e){

    e.preventDefault();

    const userId=document.getElementById("userId").value;

    const pId=document.getElementById("profileId").value;

    const profileData={

    fullName:document.getElementById("fullName").value,

    jobTitle:document.getElementById("jobTitle").value,

    phone:document.getElementById("phone").value,

    location:document.getElementById("location").value,

    education:document.getElementById("education").value,

    skills:document.getElementById("skills").value,

    experience:document.getElementById("experience").value,

    totalExperience:parseInt(document.getElementById("employmentStatus").value)

    };

    const url=pId?`/api/jobseeker/profile/${pId}`:`/api/jobseeker/profile/${userId}`;

    const method=pId?"PUT":"POST";

    const res=await fetch(url,{

    method:method,

    headers:{'Content-Type':'application/json'},

    body:JSON.stringify(profileData)

    });

    if(res.ok){

    Swal.fire({

    icon:'success',

    title:'Profile Updated',

    timer:1500,

    showConfirmButton:false

    }).then(()=>{

    window.location.href='/jobseeker/profile/manage';

    });

    }

    else{

    Swal.fire({

    icon:'error',

    title:'Update Failed'

    });

    }

    }

</script>

</body>

</html>
