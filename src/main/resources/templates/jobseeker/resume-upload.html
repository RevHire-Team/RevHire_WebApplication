<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Upload Resume | RevHire</title>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    :root{
    --primary:#2563eb;
    --sidebar-bg:#0f172a;
    --bg-subtle:#f8fafc;
    --border:#e2e8f0;
    --text-main:#0f172a;
    --card-shadow:0 10px 25px -5px rgba(0,0,0,0.05);
    }

    *{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif;}
    body{background:var(--bg-subtle);color:var(--text-main);display:flex;min-height:100vh;}

    .sidebar{
    width:250px;height:100vh;background:var(--sidebar-bg);color:white;
    position:fixed;padding:1.5rem 1rem;display:flex;flex-direction:column;z-index:1000;
    }

    .logo{
    font-size:1.5rem;font-weight:800;padding:0 1rem 1.5rem;
    display:flex;align-items:center;gap:10px;color:white;text-decoration:none;
    }

    .nav-menu{list-style:none;padding:0;flex-grow:1;overflow-y:auto;}

    .nav-link{
    color:#94a3b8;text-decoration:none;padding:0.7rem 1rem;border-radius:10px;
    display:flex;align-items:center;gap:12px;font-weight:500;transition:0.3s;margin-bottom:2px;
    }

    .nav-link:hover,.nav-link.active{background:var(--primary);color:white;}

    .main-content{margin-left:250px;flex:1;padding:3rem;width:calc(100% - 250px);}

    .upload-card{
    background:white;border-radius:24px;border:1px solid var(--border);
    padding:40px;box-shadow:var(--card-shadow);max-width:600px;margin:0 auto;text-align:center;
    }

    .drop-zone{
    border:2px dashed var(--border);border-radius:16px;padding:40px;
    background:#fcfdfe;transition:all 0.3s ease;cursor:pointer;margin-bottom:20px;
    }

    .drop-zone:hover{border-color:var(--primary);background:#f0f7ff;}

    .upload-icon{font-size:3rem;color:var(--primary);margin-bottom:15px;}

    .btn-primary{
    background:var(--primary);border:none;padding:12px 30px;
    border-radius:12px;font-weight:700;transition:0.3s;
    }

    .current-resume-card{
    background:#ffffff;border-radius:16px;border:1px solid var(--border);
    padding:20px;margin-top:2rem;
    }

    @media(max-width:1024px){
    .sidebar{width:80px;}
    .sidebar span,.logo span{display:none;}
    .main-content{margin-left:80px;width:calc(100% - 80px);}
    }
  </style>

</head>

<body>

<nav class="sidebar">
  <a th:href="@{'/jobseeker/dashboard/' + ${session.userId}}" class="logo">
    <i class="bi bi-rocket-takeoff-fill text-primary"></i>
    <span>RevHire</span>
  </a>

  <div class="nav-menu">

    <a th:href="@{'/jobseeker/dashboard/' + ${session.userId}}" class="nav-link">
      <i class="bi bi-speedometer2"></i> <span>Dashboard</span>
    </a>

    <a th:href="@{/jobseeker/profile/manage}" class="nav-link">
      <i class="bi bi-pencil"></i> <span>Manage Profile</span>
    </a>

    <a th:href="@{/jobseeker/resume/builder}" class="nav-link">
      <i class="bi bi-file-earmark-text"></i> <span>Resume Builder</span>
    </a>

    <a th:href="@{/jobseeker/resume/view}" class="nav-link">
      <i class="bi bi-eye"></i><span>View Resume</span>
    </a>

    <a th:href="@{/jobseeker/resume/upload}" class="nav-link active">
      <i class="bi bi-upload"></i> <span>Upload Resume</span>
    </a>

    <a th:href="@{/jobseeker/jobs/search}" class="nav-link">
      <i class="bi bi-search"></i> <span>Search Jobs</span>
    </a>

    <a th:href="@{/jobseeker/applications}" class="nav-link">
      <i class="bi bi-briefcase"></i> <span>Applications</span>
    </a>

  </div>
</nav>

<main class="main-content">

  <div class="container-fluid" style="max-width:700px;">

    <div class="upload-card">

      <div class="upload-icon">
        <i class="bi bi-cloud-arrow-up-fill"></i>
      </div>

      <h2 class="fw-800 mb-2">Upload Resume</h2>
      <p class="text-muted mb-4">Formats: PDF, DOCX (Max 2MB)</p>

      <form id="uploadForm">

        <input type="hidden" id="userId" th:value="${session.userId != null ? session.userId : ''}">

        <!-- RESUME -->

        <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
          <p id="fileNameDisplay" class="mb-0 text-muted">Click to select resume</p>
          <input type="file" id="fileInput" hidden accept=".pdf,.doc,.docx">
        </div>

        <!-- OPTIONAL COVER LETTER -->

        <div class="drop-zone" onclick="document.getElementById('coverInput').click()">
          <p id="coverNameDisplay" class="mb-0 text-muted">Upload Cover Letter (Optional)</p>
          <input type="file" id="coverInput" hidden accept=".pdf,.doc,.docx">
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-2" id="uploadBtn">
          Upload & Replace
        </button>

      </form>

    </div>

  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

  document.getElementById('fileInput').onchange=function(){
  if(this.files[0]){
  const display=document.getElementById('fileNameDisplay');
  display.innerText=this.files[0].name;
  display.classList.remove('text-muted');
  display.classList.add('fw-bold','text-primary');
  }
  };

  document.getElementById('coverInput').onchange=function(){
  if(this.files[0]){
  const display=document.getElementById('coverNameDisplay');
  display.innerText=this.files[0].name;
  display.classList.remove('text-muted');
  display.classList.add('fw-bold','text-primary');
  }
  };

  document.getElementById('uploadForm').onsubmit=async(e)=>{

  e.preventDefault();

  const userId=document.getElementById('userId').value;
  const file=document.getElementById('fileInput').files[0];
  const coverFile=document.getElementById('coverInput').files[0];

  if(!file){
  alert("Please select a resume file.");
  return;
  }

  const btn=document.getElementById('uploadBtn');

  btn.disabled=true;
  btn.innerHTML='<span class="spinner-border spinner-border-sm me-2"></span>Uploading...';

  const formData=new FormData();

  formData.append('file',file);

  if(coverFile){
  formData.append('coverLetter',coverFile);
  }

  try{

  const res=await fetch(`/api/resume/upload/${userId}`,{
  method:'POST',
  body:formData
  });

  if(res.ok){
  alert("Upload successful");
  document.getElementById('fileInput').value='';
  document.getElementById('coverInput').value='';
  document.getElementById('fileNameDisplay').innerText="Click to select resume";
  document.getElementById('coverNameDisplay').innerText="Upload Cover Letter (Optional)";
  }

  else{
  alert("Upload failed");
  }

  }catch(err){
  alert("Connection error.");
  }

  btn.disabled=false;
  btn.innerHTML='Upload & Replace';

  };

</script>

</body>
</html>
