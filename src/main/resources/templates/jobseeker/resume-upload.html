<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Upload Resume | RevHire</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
        --primary: #2563eb;
        --sidebar-bg: #0f172a;
        --bg-subtle: #f8fafc;
        --border: #e2e8f0;
        --text-main: #0f172a;
        --card-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { background: var(--bg-subtle); color: var(--text-main); display: flex; min-height: 100vh; }

    /* Sidebar Navigation */
    .sidebar {
        width: 250px; height: 100vh; background: var(--sidebar-bg); color: white;
        position: fixed; padding: 1.5rem 1rem; display: flex; flex-direction: column; z-index: 1000;
    }
    .logo {
        font-size: 1.5rem; font-weight: 800; padding: 0 1rem 1.5rem;
        display: flex; align-items: center; gap: 10px; color: white; text-decoration: none;
    }
    .nav-menu { list-style: none; padding: 0; flex-grow: 1; overflow-y: auto; }
    .nav-link {
        color: #94a3b8; text-decoration: none; padding: 0.7rem 1rem; border-radius: 10px;
        display: flex; align-items: center; gap: 12px; font-weight: 500; transition: 0.3s; margin-bottom: 2px;
    }
    .nav-link:hover, .nav-link.active { background: var(--primary); color: white; }

    /* Main Content */
    .main-content { margin-left: 250px; flex: 1; padding: 3rem; width: calc(100% - 250px); }

    .upload-card {
        background: white; border-radius: 24px; border: 1px solid var(--border);
        padding: 40px; box-shadow: var(--card-shadow); max-width: 600px; margin: 0 auto; text-align: center;
    }
    .drop-zone {
        border: 2px dashed var(--border); border-radius: 16px; padding: 40px;
        background: #fcfdfe; transition: all 0.3s ease; cursor: pointer;
    }
    .drop-zone:hover { border-color: var(--primary); background: #f0f7ff; }
    .upload-icon { font-size: 3rem; color: var(--primary); margin-bottom: 15px; }

    .btn-primary {
        background: var(--primary); border: none; padding: 12px 30px;
        border-radius: 12px; font-weight: 700; transition: 0.3s;
    }

    .current-resume-card {
        background: #ffffff; border-radius: 16px; border: 1px solid var(--border);
        padding: 20px; margin-top: 2rem;
    }

    @media (max-width: 1024px) {
        .sidebar { width: 80px; }
        .sidebar span, .logo span { display: none; }
        .main-content { margin-left: 80px; width: calc(100% - 80px); }
    }
  </style>
</head>
<body>

<nav class="sidebar">
  <a th:href="@{/jobseeker/dashboard}" class="logo">
    <i class="bi bi-rocket-takeoff-fill text-primary"></i>
    <span>RevHire</span>
  </a>
  <div class="nav-menu">
    <a th:href="@{'/jobseeker/dashboard/' + ${session.userId}}" class="nav-link">
      <i class="bi bi-speedometer2"></i> <span>Dashboard</span>
    </a>
    <a th:href="@{/jobseeker/profile/manage}" class="nav-link">
      <i class="bi bi-pencil"></i> <span>Manage Profile</span>
    </a>
    <a th:href="@{/jobseeker/resume/builder}" class="nav-link">
      <i class="bi bi-file-earmark-text"></i> <span>Resume Builder</span>
    </a>
    <a th:href="@{/jobseeker/resume/upload}" class="nav-link">
      <i class="bi bi-upload"></i> <span>Upload Resume</span>
    </a>
    <a th:href="@{/jobseeker/jobs/search}" class="nav-link">
      <i class="bi bi-search"></i> <span>Search Jobs</span>
    </a>
    <a th:href="@{/jobseeker/applications}" class="nav-link ">
      <i class="bi bi-briefcase"></i> <span>Applications</span>
    </a>
    <a th:href="@{/jobseeker/jobs/saved}" class="nav-link">
      <i class="bi bi-heart"></i> <span>Saved Jobs</span>
    </a>
    <a th:href="@{/notifications/notification}" class="nav-link">
      <i class="bi bi-bell"></i> <span>Notifications</span>
    </a>
    <a th:href="@{/auth/reset-password}" class="nav-link">
      <i class="bi bi-key"></i> <span>Reset Password</span>
    </a>
  </div>
  <div class="mt-auto">
    <a th:href="@{/}" class="nav-link text-danger">
      <i class="bi bi-box-arrow-left"></i> <span>Logout</span>
    </a>
  </div>
</nav>

<main class="main-content">
  <div class="container-fluid" style="max-width: 700px;">
    <div class="upload-card">
      <div class="upload-icon"><i class="bi bi-cloud-arrow-up-fill"></i></div>
      <h2 class="fw-800 mb-2">Upload Resume</h2>
      <p class="text-muted mb-4">Formats: PDF, DOCX (Max 2MB)</p>

      <form id="uploadForm">
        <input type="hidden" id="userId" th:value="${session.userId != null ? session.userId : ''}">
        <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
          <p id="fileNameDisplay" class="mb-0 text-muted">Click to select file</p>
          <input type="file" id="fileInput" hidden accept=".pdf,.doc,.docx">
        </div>
        <button type="submit" class="btn btn-primary w-100 mt-4" id="uploadBtn">Upload & Replace</button>
      </form>
    </div>

    <div id="resumePreview" class="current-resume-card d-none">
      <div class="d-flex align-items-center justify-content-between mb-3 text-start">
        <div>
          <h5 class="fw-800 mb-0 text-primary">Active Resume</h5>
        </div>
        <span class="badge bg-success">Active</span>
      </div>
      <div class="p-3 border rounded-3 bg-light d-flex align-items-center">
        <i id="fileIcon" class="bi bi-file-earmark-pdf-fill fs-2 text-danger me-3"></i>
        <div class="text-start flex-grow-1">
          <h6 id="displayFileName" class="mb-0 fw-700 text-truncate">filename.pdf</h6>
          <small id="displayFileSize" class="text-muted">0 KB</small>
        </div>
        <a id="downloadBtn" href="#" class="btn btn-sm btn-light border">
          <i class="bi bi-download"></i>
        </a>
      </div>
    </div>
  </div>
</main>

<div class="modal fade" id="errorModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content shadow-lg text-center border-0 rounded-4">
      <div class="modal-body p-4">
        <div class="mb-3" style="font-size: 3rem; color: #ef4444;">
          <i class="bi bi-exclamation-circle-fill"></i>
        </div>
        <h4 class="fw-800 mb-2">Upload Error</h4>
        <p id="errorMessage" class="text-muted mb-4">The file exceeds the limit.</p>
        <button type="button" class="btn btn-danger w-100 py-2 fw-700 rounded-3" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  let errorModal;

  document.addEventListener('DOMContentLoaded', () => {
      // Initialize Modal properly once
      errorModal = new bootstrap.Modal(document.getElementById('errorModal'));
      fetchResumeStatus();
  });

  <input type="hidden" id="userId" th:value="${session.userId != null ? session.userId : ''}">

  document.getElementById('fileInput').onchange = function() {
      if(this.files[0]) {
          document.getElementById('fileNameDisplay').innerText = this.files[0].name;
          document.getElementById('fileNameDisplay').classList.remove('text-muted');
          document.getElementById('fileNameDisplay').classList.add('fw-bold', 'text-primary');
      }
  };

  document.getElementById('uploadForm').onsubmit = async (e) => {
      e.preventDefault();
      const userId = document.getElementById('userId').value;
      const fileInput = document.getElementById('fileInput');
      const btn = document.getElementById('uploadBtn');
      const errorMessage = document.getElementById('errorMessage');

      const file = fileInput.files[0];
      if (!file) {
          errorMessage.innerText = "Please select a file first.";
          errorModal.show();
          return;
      }

      // 2MB Limit Check
      const maxSize = 2 * 1024 * 1024;
      if (file.size > maxSize) {
          errorMessage.innerText = `File too large (${(file.size / (1024 * 1024)).toFixed(2)}MB). Max limit is 2.00MB.`;
          errorModal.show();
          return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Uploading...';

      const formData = new FormData();
      formData.append('file', file);

      try {
  const res = await fetch(`/api/resume/upload/${userId}`, {
      method: 'POST',
      body: formData
  });

      if (res.ok) {
          window.location.reload();
      } else {
          // Use res.text() if the server returns a string instead of JSON
          const errorText = await res.text();
          errorMessage.innerText = errorText || "Server rejected the upload (Status: " + res.status + ")";
          errorModal.show();
          }
      } catch (err) {
          errorMessage.innerText = "Check if the server is running or if the file is too large.";
          errorModal.show();
      } finally {
          btn.disabled = false;
          btn.innerHTML = 'Upload & Replace';
      }
  };
</script>
</body>
</html>//check
