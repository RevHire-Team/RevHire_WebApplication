<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>My Applications | RevHire</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
        background:#f8fafc;
        font-family: 'Segoe UI', sans-serif;
        }

        .page-header{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:25px;
        }

        .card{
        border:none;
        border-radius:14px;
        box-shadow:0 10px 20px rgba(0,0,0,0.05);
        }

        .table thead{
        background:#1f2937;
        color:white;
        }

        .table td{
        vertical-align:middle;
        }

        .badge{
        padding:6px 12px;
        font-size:13px;
        border-radius:8px;
        }

        .badge-applied{
        background:#22c55e;
        }

        .badge-shortlisted{
        background:#f59e0b;
        }

        .withdraw-btn{
        border-radius:8px;
        padding:5px 14px;
        }

    </style>

</head>

<body>

<div class="container py-5">

    <div class="page-header">

        <h3 class="fw-bold">My Applications</h3>

        <a th:href="@{'/jobseeker/dashboard/' + ${session.userId}}" class="btn btn-outline-primary">
            ← Back to Dashboard
        </a>

    </div>

    <div class="card p-3">

        <table class="table align-middle mb-0">

            <thead>
            <tr>
                <th>Job</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody>

            <tr>

                <td class="fw-semibold">
                    Java Developer
                </td>

                <td>
                    <span class="badge badge-applied">APPLIED</span>
                </td>

                <td>
                    <button class="btn btn-danger btn-sm withdraw-btn">
                        Withdraw
                    </button>
                </td>

            </tr>

            <tr>

                <td class="fw-semibold">
                    Python Developer
                </td>

                <td>
                    <span class="badge badge-shortlisted">SHORTLISTED</span>
                </td>

                <td>
                    -
                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
