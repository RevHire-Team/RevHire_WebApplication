<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Details | RevHire</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --sidebar-bg: #0f172a; --bg: #f8fafc; }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; display: flex; }
        .sidebar { width: 250px; height: 100vh; background: var(--sidebar-bg); color: white; position: fixed; padding: 1.5rem 1rem; }
        .nav-link { color: #94a3b8; padding: 0.8rem 1rem; border-radius: 10px; display: flex; align-items: center; gap: 12px; text-decoration: none; margin-bottom: 5px; }
        .nav-link.active { background: var(--primary); color: white; }
        .main-content { margin-left: 250px; flex: 1; padding: 3rem; }
        .details-card { background: white; border-radius: 20px; padding: 2.5rem; border: 1px solid #e2e8f0; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<nav class="sidebar">
    <!-- Logo -->
    <a th:href="@{/employer/dashboard/{id}(id=${session.loggedInUser.userId})}" class="logo">
        <i class="bi bi-rocket-takeoff-fill text-primary"></i>
        <span>RevHire</span>
    </a>

    <!-- Navigation Menu -->
    <div class="nav-menu">
        <a th:href="@{/employer/dashboard/{id}(id=${session.loggedInUser.userId})}" class="nav-link ">
            <i class="bi bi-speedometer2"></i> <span>Dashboard</span>
        </a>
        <a th:href="@{/jobs/create}" class="nav-link">
            <i class="bi bi-plus-lg"></i> <span>Post New Job</span>
        </a>
        <a th:href="@{/jobs/manage}" class="nav-link">
            <i class="bi bi-building"></i> <span>Manage Jobs</span>
        </a>
        <a th:href="@{/applications/manage}" class="nav-link">
            <i class="bi bi-file-earmark-person"></i> <span>Manage Applications</span>
        </a>
        <a th:href="@{/notifications/notification}" class="nav-link">
            <i class="bi bi-bell"></i> <span>Notifications</span>
        </a>
        <a th:href="@{/auth/reset-password}" class="nav-link">
            <i class="bi bi-key"></i> <span>Reset Password</span>
        </a>
    </div>

    <!-- Logout -->
    <div class="mt-auto">
        <a th:href="@{/}" class="nav-link text-danger">
            <i class="bi bi-box-arrow-left"></i> <span>Logout</span>
        </a>
    </div>
</nav>

<main class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-800">Job Details</h2>
        <a th:href="@{/jobs/jobs/manage}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Back</a>
    </div>

    <div class="details-card">
        <div id="jobDetailsContent">
            <h3 id="jobTitle" class="fw-800 text-primary">Loading...</h3>
            <hr>
            <div class="row">
                <div class="col-md-6">
                    <p><strong>Location:</strong> <span id="jobLocation">-</span></p>
                    <p><strong>Job Type:</strong> <span id="jobType">-</span></p>
                    <p><strong>Salary:</strong> <span id="jobSalary">-</span></p>
                </div>
                <div class="col-md-6">
                    <p><strong>Experience:</strong> <span id="jobExperience">-</span> years</p>
                    <p><strong>Status:</strong> <span id="jobStatus" class="badge"></span></p>
                </div>
            </div>
            <p><strong>Description:</strong></p>
            <p id="jobDescription" class="text-muted"></p>
        </div>
    </div>
</main>

<script th:inline="javascript">
    const jobId = [[${jobId}]];

    async function fetchJobDetails() {
        const response = await fetch(`/jobs/get/${jobId}`);
        const job = await response.json();

        document.getElementById('jobTitle').innerText = job.title;
        document.getElementById('jobLocation').innerText = job.location;
        document.getElementById('jobType').innerText = job.jobType;
        document.getElementById('jobSalary').innerText = `${job.salaryMin} - ${job.salaryMax}`;
        document.getElementById('jobExperience').innerText = job.experienceRequired;
        document.getElementById('jobDescription').innerText = job.description;

        const statusBadge = document.getElementById('jobStatus');
        statusBadge.innerText = job.status;
        statusBadge.className = `badge ${job.status === 'OPEN' ? 'bg-success' : 'bg-secondary'}`;
    }

    fetchJobDetails();
</script>
</body>
</html>
