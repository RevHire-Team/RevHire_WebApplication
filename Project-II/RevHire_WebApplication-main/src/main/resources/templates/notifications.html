<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Notifications | RevHire</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        :root{
        --primary:#2563eb;
        --bg:#f8fafc;
        --border:#e2e8f0;
        --card-shadow:0 10px 15px -3px rgba(0,0,0,0.05);
        }

        *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Plus Jakarta Sans',sans-serif;
        }

        body{
        background:var(--bg);
        min-height:100vh;
        display:flex;
        justify-content:center;
        padding:40px 15px;
        }

        .container-box{
        width:100%;
        max-width:850px;
        }

        .header-card{
        background:white;
        padding:18px 22px;
        border-radius:12px;
        border:1px solid var(--border);
        margin-bottom:20px;
        display:flex;
        justify-content:space-between;
        align-items:center;
        box-shadow:var(--card-shadow);
        }

        .back-btn{
        border:none;
        background:#eef2ff;
        color:var(--primary);
        padding:7px 14px;
        border-radius:8px;
        font-weight:600;
        font-size:14px;
        text-decoration:none;
        }

        .back-btn:hover{
        background:#dbeafe;
        color:var(--primary);
        }

        .notification-card{
        background:white;
        border-radius:12px;
        border:1px solid var(--border);
        padding:16px;
        margin-bottom:10px;
        display:flex;
        align-items:flex-start;
        gap:14px;
        transition:all .2s;
        box-shadow:var(--card-shadow);
        }

        .notification-card.unread{
        border-left:4px solid var(--primary);
        background:#f0f7ff;
        }

        .icon-circle{
        width:40px;
        height:40px;
        border-radius:10px;
        display:flex;
        align-items:center;
        justify-content:center;
        flex-shrink:0;
        }

        .unread .icon-circle{
        background:var(--primary);
        color:white;
        }

        .read .icon-circle{
        background:#f1f5f9;
        color:#64748b;
        }

        .message{
        font-weight:500;
        margin-bottom:4px;
        }

        .meta{
        font-size:12px;
        color:#64748b;
        }

        .btn-read{
        font-size:12px;
        font-weight:700;
        color:var(--primary);
        border:none;
        background:none;
        cursor:pointer;
        }

        .btn-read:hover{
        text-decoration:underline;
        }

        .empty-box{
        background:white;
        border-radius:12px;
        padding:40px;
        text-align:center;
        border:1px solid var(--border);
        }

    </style>
</head>

<body>

<div class="container-box">

    <!-- Header -->
    <div class="header-card">
        <div>
            <h4 class="fw-bold mb-0">Notifications</h4>
            <small class="text-muted">Stay updated with your application activity</small>
        </div>

            <a th:if="${session.role == 'JOB_SEEKER'}"
               th:href="@{'/jobseeker/dashboard/' + ${session.userId}}"
               class="back-btn">
                <i class="bi bi-arrow-left"></i> Back to Dashboard
            </a>

            <a th:if="${session.role == 'EMPLOYER'}"
               th:href="@{'/employer/dashboard/' + ${session.userId}}"
               class="back-btn">
                <i class="bi bi-arrow-left"></i> Back to Dashboard
            </a>

            <a th:if="${session.role == null}" href="/" class="back-btn">
                <i class="bi bi-house"></i> Go Home
            </a>
    </div>

    <!-- Notification List -->
    <div id="notificationList">
        <div class="text-center py-5">
            <div class="spinner-border text-primary"></div>
        </div>
    </div>

    <input type="hidden" id="userId" th:value="${session.userId}">

</div>

<script>

    const userId=document.getElementById("userId").value;

    async function loadNotifications(){

    const response=await fetch(`/notifications/api/${userId}`);
    const notifications=await response.json();

    const list=document.getElementById("notificationList");

    if(notifications.length===0){

    list.innerHTML=`
    <div class="empty-box">
    <i class="bi bi-bell-slash fs-1 text-muted"></i>
    <p class="mt-3 text-muted">You don't have any notifications yet.</p>
    </div>
    `;

    return;
    }

    list.innerHTML=notifications.map(n=>`

    <div class="notification-card ${n.isRead?'read':'unread'}"
    id="notif-${n.notificationId}">

    <div class="icon-circle">
    <i class="bi ${n.isRead?'bi-bell':'bi-bell-fill'}"></i>
    </div>

    <div class="flex-grow-1">

    <div class="message">${n.message}</div>

    <div class="d-flex justify-content-between">

    <span class="meta">Update Received</span>

    ${!n.isRead?`<button class="btn-read"
    onclick="markAsRead(${n.notificationId})">
    Mark as read
    </button>`:''}

    </div>

    </div>

    </div>

    `).join("");

    }

    async function markAsRead(id){

    const response=await fetch(`/notifications/api/${id}/read`,{
    method:'PUT'
    });

    if(response.ok){

    const card=document.getElementById(`notif-${id}`);

    card.classList.remove("unread");
    card.classList.add("read");

    loadNotifications();

    }

    }

    document.addEventListener("DOMContentLoaded",loadNotifications);

    setInterval(loadNotifications,10000);

</script>

</body>
</html>
